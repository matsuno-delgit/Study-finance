Step 3：2年度シナジー = 35億円 × 50% = 17.5億円、現在価値 = 17.5億円 ÷ (1.06)^2 ≈ 15.6億円","Step 4：3年度シナジー = 35億円 × 100% = 35億円、現在価値 = 35億円 ÷ (1.06)^3 ≈ 29.4億円","Step 5：累積現在価値 = 6.6億円 + 15.6億円 + 29.4億円 ≈ 51.6億円"],"explanation":"【解法】コストシナジーの実現は段階的に進行することが一般的です。20%→50%→100%という段階的な達成率を反映して、各年度のシナジーを計算し、現在価値に割引く必要があります。初年度6.6億円、2年度15.6億円、3年度29.4億円の合計で、3年間の累積効果は51.6億円となります。"}],"caseStudy":{"title":"PMI推進体制と100日プランの構築","scenario":"日本の大型M&Aケースで、A社（時価総額5,000億円、従業員数10,000名）がB社（従業員数2,000名）を買収しました。買収価格は300億円で、計画されたシナジーは年間60億円です。クロージング日（Day 1）が決定され、A社のCFO、経営企画部長、人事部長の3名がPMO（Post Merger Office）トップマネジメントチームを形成することになりました。しかし、B社の経営陣やキーパーソン（特に営業部長、製造部長など20名）の動向が不安定で、既に2名が退職の意思を示しています。また、業務・システム統合も課題です。A社のERP システムはSAP、B社のシステムはレガシーシステムであり、統合には約12ヶ月必要と予想されています。","questions":["Day 1〜100日のクイック・ウィン（短期シナジー）計画として、実現可能な施策を5つ挙げ、各々の達成目標を定めてください。","B社のキーパーソン流出を防止し、統合を推進するためのPMI推進体制と、Day 1から30日間のコミュニケーション戦略を具体的に説明してください。"],"modelAnswer":"【クイック・ウィン施策】①購買統合：主要サプライヤーとの再交渉で2億円削減（1-3ヶ月）②間接部門統合：管理部門の統合で1.5億円削減（1-2ヶ月）③営業チャネル統合：クロスセル促進で営業利益0.5億円増（継続）④システム連携：緊急でB社システムとA社システムのデータ連携実装（3-4ヶ月）⑤製造プロセス標準化：B社製造プロセスの改善で0.5億円削減（2-4ヶ月）。【キーパーソン対応＆推進体制】①PMO設置：CFOトップ、副トップはB社出身の経営陣を登用し、統合計画の透明性を確保②Day 1：経営陣がB社に訪問、新体制のビジョンを発表③Day 1-30：20名のキーパーソン全員との個別面談、処遇と役割を明確化④リテンション・ボーナス：キーパーソン20名に対し、12ヶ月雇用継続でボーナス支給⑤コミュニケーション：タウンホールミーティング（Week 1, Week 4）、月1回の全体ニュースレター発行⑥人事ローテーション：B社の有能な中堅社員をA社の主要部署にローテーション、キャリアパスを示す。"}},{"id":19,"title":"ケーススタディ","subtitle":"実践的な総合演習","phase":3,"content":"<h3>ケーススタディ：製造業A社によるB社買収</h3>\n<h4>1. 背景</h4>\n<p>製造業A社（東証プライム上場）は、成長戦略の一環として、同業のB社（非上場）の買収を検討しています。あなたは経営企画部の担当者として、本案件の分析を任されました。</p>\n<h4>2. A社の概要</h4>\n<ul>\n<li>売上高：3,000億円</li>\n<li>営業利益：240億円（営業利益率8%）</li>\n<li>純利益：160億円</li>\n<li>時価総額：3,200億円</li>\n<li>自己資本：2,000億円</li>\n<li>有利子負債：800億円</li>\n<li>現金：500億円</li>\n</ul>\n<h4>3. B社の概要</h4>\n<ul>\n<li>売上高：500億円</li>\n<li>EBITDA：60億円（EBITDA率12%）</li>\n<li>営業利益：40億円</li>\n<li>純資産：200億円</li>\n<li>有利子負債：100億円</li>\n<li>現金：30億円</li>\n</ul>\n<p>B社株主（オーナー一族）は、EV/EBITDA 8倍程度での売却を希望しています。</p>\n<h4>4. シナジー想定</h4>\n<ul>\n<li>コストシナジー：購買統合、間接部門統合で年間15億円削減（3年目から完全実現）</li>\n<li>売上シナジー：A社販路活用で年間売上30億円増加（営業利益率8%想定、5年目から完全実現）</li>\n</ul>\n<h3>設問と分析フレームワーク</h3>\n<p>各設問について、以下の視点で検討：①買収価格の算定②シナジーの評価③資金調達戦略④PMI計画の策定⑤リスク評価</p>","keyPoints":["マルチプル法による買収価格評価：B社のEV/EBITDA倍率8倍から株式価値を算定","シナジー価値の現在価値計算：税引後効果とWACCを用いた割引計算が重要","買収価格上限の決定：スタンドアローン価値＋シナジーシェアのバランス","資金調達方法の比較：全額借入、全額増資、借入＋現金の組み合わせ","買収後の財務指標への影響：D/Eレシオ、EPS希薄化の分析","PMI計画の策定：短期シナジー実現とキーパーソン確保の両立"],"quizzes":[{"question":"B社の買収価格（マルチプル法）を以下データから計算してください。EV/EBITDA倍率：8倍、EBITDA：60億円、有利子負債：100億円、現金：30億円","options":["株式価値 = 410億円","株式価値 = 480億円","株式価値 = 550億円","株式価値 = 630億円"],"answer":0,"explanation":"【解法】Step 1：EV = EBITDA × EV/EBITDA倍率 = 60億円 × 8倍 = 480億円。Step 2：純有利子負債 = 有利子負債 - 現金 = 100億円 - 30億円 = 70億円。Step 3：株式価値 = EV - 純有利子負債 = 480億円 - 70億円 = 410億円。"},{"question":"コストシナジー（年間15億円、3年目から完全実現）の現在価値を計算してください。（税率30%、WACC 6%、永久成長率0%）","options":["現在価値 = 約156億円","現在価値 = 約105億円","現在価値 = 約175億円","現在価値 = 約210億円"],"answer":0,"explanation":"【解法】Step 1：税引後効果 = 15億円 × (1 - 30%) = 10.5億円。Step 2：永久価値（3年目以降） = 10.5億円 ÷ 6% = 175億円。Step 3：現在価値 = 175億円 ÷ (1.06)^2 = 175億円 ÷ 1.1236 ≈ 156億円。"},{"question":"売上シナジー（年間売上30億円増、営業利益率8%、5年目から完全実現）の現在価値を計算してください。（税率30%、WACC 6%）","options":["現在価値 = 約22億円","現在価値 = 約28億円","現在価値 = 約35億円","現在価値 = 約42億円"],"answer":0,"explanation":"【解法】Step 1：営業利益 = 30億円 × 8% = 2.4億円。Step 2：税引後効果 = 2.4億円 × (1 - 30%) = 1.68億円。Step 3：永久価値（5年目以降） = 1.68億円 ÷ 6% = 28億円。Step 4：現在価値 = 28億円 ÷ (1.06)^4 = 28億円 ÷ 1.2625 ≈ 22億円。"},{"question":"シナジー総額(コスト+売上)は約178億円です。シナジーを50%ベースで買い手が獲得する場合、買収価格の提案レンジはいくらか？","options":["初期オファー400億円、交渉上限450〜480億円","初期オファー450億円、交渉上限500〜520億円","初期オファー350億円、交渉上限400〜430億円","初期オファー500億円、交渉上限550〜580億円"],"answer":0,"explanation":"【解法】スタンドアローン価値：410億円。シナジー178億円の50%を買い手が獲得：89億円。理論上の上限：410億円 + 89億円 = 499億円。ただし、売り手希望（EV/EBITDA 8倍）が410億円であることを踏まえ、初期オファーは400億円程度、交渉上限は450〜480億円（シナジーの30〜40%を上乗せ）が妥当。"},{"question":"買収資金450億円を調達する場合、手元現金200億円＋借入250億円とした場合の買収後D/Eレシオを計算してください。","options":["D/E ≈ 0.43倍","D/E ≈ 0.60倍","D/E ≈ 0.75倍","D/E ≈ 0.90倍"],"answer":0,"explanation":"【解法】Step 1：買収後の有利子負債 = 現有利子負債800億円 + 新規借入250億円 - 現金充当200億円 + B社有利子負債100億円 - B社現金30億円 = 920億円。Step 2：買収後の自己資本 ≈ 2,000億円 + 100億円（B社純資産）= 2,100億円。Step 3：D/E = 920億円 ÷ 2,100億円 ≈ 0.43倍。"}],"calculations":[{"question":"B社の標準的な買収価格を、スタンドアローン価値410億円とシナジー価値178億円から検討し、買い手の利益を最大化する買収価格レンジを提案してください。","hint":"シナジー価値の配分（売り手と買い手の利益配分）を考慮し、複数のシナリオで検討","answer":"推奨買収価格：450～490億円（初期オファー410～430億円から段階的に交渉）","steps":["Step 1：スタンドアローン価値 = 410億円（売り手希望）","Step 2：シナジー総額 = 178億円","Step 3：シナリオA（売り手70%、買い手30%）：410億円 + (178億円 × 30%) = 410億円 + 53.4億円 ≈ 463億円","Step 4：シナリオB（売り手60%、買い手40%）：410億円 + (178億円 × 40%) = 410億円 + 71.2億円 ≈ 481億円","Step 5：シナリオC（売り手50%、買い手50%）：410億円 + (178億円 × 50%) = 410億円 + 89億円 = 499億円","Step 6：推奨レンジ：シナリオA～Bの中間である450～490億円が買い手にとって適切"],"explanation":"【解法】買収価格の決定には、スタンドアローン価値とシナジーの配分をどうするかが重要です。売り手希望の410億円はスタンドアローン価値ですが、買い手が実現するシナジー178億円をどの程度上乗せするかは、交渉力と買い手の期待リターンによります。一般的には、シナジーの30～40%を売り手に付与する（つまり買い手が60～70%を獲得する）パターンが多く、この場合の買収価格は450～490億円となります。"},{"question":"買収により、A社の買収後EPS（1株当たり利益）がどう変化するかを分析してください。A社の発行済み株式数を200万株と仮定し、資金調達方法は『借入250億円+現金200億円』とします。利子負担増：約2.5億円と仮定。","hint":"現在のEPS ÷ 買収後EPS を計算し、希薄化を分析","answer":"現在のEPS：80万円 → 買収後EPS：79万円（若干の希薄化）、シナジー実現で改善予想","steps":["Step 1：買収前のEPS = 純利益160億円 ÷ 発行済み株式数200万株 = 80万円/株","Step 2：買収後の利息負担増 = 新規借入250億円 × 借入金利2% ≈ 5億円（税引前）","Step 3：税引後の利息増加 = 5億円 × (1 - 30%) ≈ 3.5億円","Step 4：B社の純利益（簡易） = 営業利益40億円 - 利息100億円×2% - 税金 ≈ 25億円","Step 5：買収後のグループ純利益 = 160億円 + 25億円 - 3.5億円 = 181.5億円","Step 6：買収後のEPS = 181.5億円 ÷ 200万株 ≈ 90.75万円/株（実は利益向上で増加）","Step 7：買収直後はシナジー実現前のため若干の希薄化、3年目以降はシナジー15億円で大きく改善"],"explanation":"【解法】株式買収では、通常EPS希薄化が生じます。本ケースでは、借入による利息負担増（3.5億円）が発生しますが、B社の利益貢献25億円によって相殺されるため、実は买収後のEPSは増加します。ただしB社の利益品質や統合後のリスク要因を考慮すると、市場のEPS期待は買収後一時的に低下する可能性があります。重要なのは、3年目以降にシナジーの15億円削減が実現されることで、大幅なEPS改善が期待できる点です。"}],"caseStudy":{"title":"A社によるB社買収：総合的な経営判断","scenario":"A社の経営会議でこのM&A案件の意思決定が行われます。CFOは、買収価格450億円、資金調達は借入250億円＋現金200億円を提案しています。ただし、以下の懸念事項が経営陣から挙げられています。①買収後のD/Eレシオが0.43倍に上昇すること②B社のオーナー一族が売却後も影響力を持ち続けたい可能性があること③シナジー実現（特に購買統合）の実行リスク④PMI期間中の組織混乱による売上減少のリスク。","questions":["本買収案件の戦略的価値を、①企業価値向上②競争力強化③株主価値向上の3つの観点から評価してください。","買収実行を前提として、リスク管理と成功要因について、特にPMIの観点から具体的な対策を提案してください。"],"modelAnswer":"【戦略的価値評価】①企業価値向上：スタンドアローン価値410億円 + シナジー価値178億円で理論上の最大価値588億円が実現可能。買収価格450億円であれば、138億円の企業価値向上が見込める。②競争力強化：B社は営業利益率8%（A社並）で、販売チャネル・製品ポートフォリオの多様化が実現。業界内での地位強化とスケールメリット。③株主価値向上：3年目からのシナジー実現で年間15億円の継続的な利益増。借入D/E 0.43倍は許容範囲（業界平均0.5倍）で、財務の安全性も維持。【PMIと成功要因】①100日プラン：Day 1から購買統合、間接部門統合を同時推進。短期で3～4億円のシナジーを実現（モメンタム構築）。②キーパーソン対応：オーナー一族の顧問就任、B社経営陣の処遇を事前交渉で確定。リテンション・ボーナス支給。③ステアリング・コミッティー：A社 + B社の経営陣による統合推進委員会を日次で開催（最初の100日）。④コミュニケーション：全従業員向けタウンホールミーティング（Day 1, Day 30, Day 100）、Q&Aセッションで不安を払拭。⑤シナジー監視：月次でシナジー達成状況をモニタリング。⑥リスク対応：売上減少リスクに対しては営業力強化計画、顧客ロック・イン施策を事前に準備。"}},{"id":20,"title":"総仕上げ","subtitle":"20週間の学習総括・最終試験","phase":3,"content":"<h3>20週間の学習内容総括</h3>\n<p>この研修プログラムでは、ファイナンス・M&Aの基礎から実践的な総合判断まで、体系的に学習してきました。</p>\n<h4>Phase 1：ファイナンス基礎（Week 1-6）</h4>\n<ul>\n<li><strong>Week 1-2</strong>：財務諸表の基礎（P/L、B/S、C/F、三表の関係）</li>\n<li><strong>Week 3</strong>：企業価値評価の概念（EV、株式価値、マルチプル法）</li>\n<li><strong>Week 4</strong>：資本コスト（CAPM、β、WACC）</li>\n<li><strong>Week 5</strong>：DCF法（FCF、TV、感応度分析）</li>\n<li><strong>Week 6</strong>：Phase 1総復習</li>\n</ul>\n<h4>Phase 2：コーポレートファイナンス（Week 7-11）</h4>\n<ul>\n<li><strong>Week 7</strong>：エクイティファイナンス（公募増資、第三者割当、CB）</li>\n<li><strong>Week 8</strong>：デットファイナンス（銀行借入、社債、格付け）</li>\n<li><strong>Week 9</strong>：株主還元・資本政策（配当、自社株買い、EPS）</li>\n<li><strong>Week 10</strong>：IR・情報開示（適時開示、統合報告書）</li>\n<li><strong>Week 11</strong>：Phase 2総復習</li>\n</ul>\n<h4>Phase 3a：M&A基礎（Week 12-17）</h4>\n<ul>\n<li><strong>Week 12</strong>：M&A全体像（M&Aの種類、プロセス）</li>\n<li><strong>Week 13</strong>：M&Aプロセス詳細（NDA、LOI、ソーシング）</li>\n<li><strong>Week 14-15</strong>：M&Aバリュエーション（プレミアム、シナジー、のれん、PPA）</li>\n<li><strong>Week 16</strong>：デューデリジェンス（財務DD、法務DD、QoE）</li>\n<li><strong>Week 17</strong>：契約・クロージング（SPA、表明保証、補償条項）</li>\n</ul>\n<h4>Phase 3b：統合と実践（Week 18-20）</h4>\n<ul>\n<li><strong>Week 18</strong>：PMI（統合計画、Day 1、100日プラン）</li>\n<li><strong>Week 19</strong>：ケーススタディ（総合演習）</li>\n<li><strong>Week 20</strong>：総仕上げ（総括と最終試験）</li>\n</ul>\n<h3>重要公式・概念の整理</h3>\n<p><strong>財務指標</strong></p>\n<ul>\n<li>ROE = 純利益 ÷ 自己資本 = 利益率 × 回転率 × レバレッジ</li>\n<li>ROA = 純利益 ÷ 総資産</li>\n<li>自己資本比率 = 自己資本 ÷ 総資産</li>\n</ul>\n<p><strong>企業価値評価</strong></p>\n<ul>\n<li>EV = 時価総額 + 純有利子負債</li>\n<li>株式価値 = EV - 純有利子負債</li>\n</ul>\n<p><strong>資本コスト</strong></p>\n<ul>\n<li>株主資本コスト = Rf + β × MRP</li>\n<li>WACC = Re × E/(D+E) + Rd × (1−T) × D/(D+E)</li>\n</ul>\n<p><strong>DCF法</strong></p>\n<ul>\n<li>FCF = NOPLAT + D&A - Capex - ΔWC</li>\n<li>TV = FCF(n+1) ÷ (WACC - g)</li>\n</ul>\n<p><strong>M&A評価</strong></p>\n<ul>\n<li>買収価格 = スタンドアローン価値 + シナジー価値</li>\n<li>のれん = 買収価格 - 純資産（時価評価後）</li>\n<li>買収プレミアム = (買収価格 - 株価) ÷ 株価</li>\n</ul>","keyPoints":["財務諸表分析からM&A実行まで、20週間で体系的にファイナンス・M&A知識を習得","企業価値評価の複数手法（マルチプル法、DCF法）を使い分けることが重要","M&Aの成否はシナジー実現の可能性と、PMI計画の実行力で決まる","表明保証・補償条項などの契約面でのリスク管理がM&A成功を左右する要因","資本コストの正確な算定がバリュエーションと意思決定の基盤","PMI（Post Merger Integration）は買収前から計画を開始し、Day 1からの推進体制が重要"],"quizzes":[{"question":"企業Cの以下データから、マルチプル法とDCF法の両方で株式価値を算定し、評価レンジを求めてください。EBITDA：80億円、EV/EBITDA倍率：7倍、有利子負債：150億円、現金：50億円、来期FCF：40億円、WACC：6%、永久成長率：1%","options":["マルチプル法：460億円、DCF法：700億円、評価レンジ：460～700億円","マルチプル法：560億円、DCF法：700億円、評価レンジ：560～700億円","マルチプル法：460億円、DCF法：600億円、評価レンジ：460～600億円","マルチプル法：460億円、DCF法：800億円、評価レンジ：460～800億円"],"answer":0,"explanation":"【解法】マルチプル法：EV=80×7=560億円、純有利子負債=150-50=100億円、株式価値=560-100=460億円。DCF法：EV=40÷(6%-1%)=800億円、株式価値=800-100=700億円。評価レンジは460～700億円が妥当。"},{"question":"WACC計算：株主資本コスト8%、負債コスト（税引前）3%、実効税率30%、E:D=6:4の場合のWACCを計算してください。","options":["WACC = 5.64%","WACC = 6.12%","WACC = 6.48%","WACC = 7.00%"],"answer":0,"explanation":"【解法】税引後負債コスト = 3% × (1-30%) = 2.1%。WACC = 8% × 60% + 2.1% × 40% = 4.8% + 0.84% = 5.64%。"},{"question":"M&Aプロセスにおける、戦略策定から統合完了までの8つの主要ステップを順序通り挙げてください。","options":["戦略策定→ソーシング→初期検討→基本合意→DD→契約交渉→クロージング→PMI","ソーシング→戦略策定→初期検討→基本合意→DD→クロージング→契約交渉→PMI","戦略策定→初期検討→ソーシング→基本合意→DD→契約交渉→PMI→クロージング","戦略策定→ソーシング→基本合意→初期検討→DD→クロージング→契約交渉→PMI"],"answer":0,"explanation":"【解法】M&Aプロセスの正しい順序は①戦略策定（M&A目的の明確化）②ソーシング（候補企業の探索）③初期検討④基本合意（NDA、LOI）⑤デューデリジェンス⑥契約交渉⑦クロージング⑧PMIです。"},{"question":"のれん（Goodwill）とPPA（Purchase Price Allocation）の関係について、最も適切な説明は？","options":["PPAは買収価格を識別可能資産と負債に配分するプロセスであり、配分後の差額がのれんとなる","のれんは買収直後に認識され、PPAは1年後に実施される","PPAとのれんは同時に計上されるが、別々の会計処理である","のれんは減損の対象だが、PPAは毎年償却される"],"answer":0,"explanation":"【解法】PPA（Purchase Price Allocation）は、買収価格を被買収企業の識別可能資産（有形資産、無形資産）と負債に配分するプロセスです。配分後、買収価格と時価評価後の純資産の差額が『のれん』となります。のれんは毎年減損テストを実施し、必要に応じて減損損失を認識します。"},{"question":"表明保証と誓約事項の違いについて、最も適切なものは？","options":["表明保証は過去のファクト、誓約事項はクロージングまでの行為や状態を規定する","両者に区別はなく、同じ意味で使用される","誓約事項は表明保証より重要度が低い","表明保証はクロージング後、誓約事項はクロージング前に有効"],"answer":0,"explanation":"【解法】表明保証（Representations and Warranties）は、売り手が対象会社の過去の事実（財務諸表、訴訟の不存在等）が真実であることを表明・保証する条項。誓約事項（Covenants）は、売り手がクロージングまでの間に義務として守るべき事項（事業の通常の範囲内での運営、重大な変化がないこと等）を規定するもの。"},{"question":"M&Aにおいて、Day 1から100日間が重要とされる理由として最も適切なものは？","options":["この期間で全ての統合作業が完了する必要があるため","組織の不確実性を早期に解消し、モメンタムを構築し、キーパーソン流出を防止する時期","システム統合とプロセス統合の完全実施が必須であるため","シナジーの100%を実現する必要があるため"],"answer":1,"explanation":"【解法】Day 1～100日は『短期統合期間』として、①組織の不確実性を早期に解消（発表→実行のスピード）②クイック・ウィンによるモメンタム構築③キーパーソンとの個別面談・確保④統合推進体制（PMO）の設置が重要です。この時期でしっかり対応することで、その後の中長期統合がスムーズに進行します。"},{"question":"シナジー価値の評価において、『買い手が獲得できるシナジーの割合』を決定する際に考慮すべき要因として、最も重要でないものは？","options":["売り手の交渉力と代替案の存在","シナジー実現に必要な買い手の投資・努力","買収対象企業の業界内での競争ポジション","公取委承認時の買収対象の営業損失額"],"answer":3,"explanation":"【解法】シナジーの配分は①売り手の交渉力②買い手のシナジー実現能力③市場環境・代替案の存在度で決定されます。一般的には、シナジーの30～50%を売り手に付与し、70～50%を買い手が獲得するバランスが多いです。公取委承認時の営業損失額は直接的な関連性がありません。"},{"question":"被買収企業のオーナー経営者が買収後も組織に影響力を保ち続けたい場合、PMI成功を確保するための対応策として最も効果的なものは？","options":["オーナーの意見を無視し、買収側の経営方針を全て新しい経営陣に委任する","オーナーを顧問として位置付けし、緊急時の相談窓口としつつ、日次経営は新体制で実施。キャリア展望と処遇を事前に合意する","オーナーが引き続き経営陣に留まり、被買収企業の全ての決定権を保有する","オーナーの雇用契約を直後に解除し、完全に組織から除外する"],"answer":1,"explanation":"【解法】オーナー経営者との関係構築は、非上場企業買収におけるPMI成功の重要要因です。①顧問や相談役としての適切な処遇②キャリアパスの明確化③個別面談での期待値調整が重要。完全に排除することはモチベーション喪失につながり、一方、経営権を保持させることは統合を阻害します。バランスの取れた対応が必須です。"}],"calculations":[{"question":"企業Dを買収する場合、スタンドアローン価値が300億円、想定シナジー総額が100億円です。買い手の内部収益率（IRR）目標が20%の場合、買い手が最大いくらの買収価格を提示できるでしょうか？（シナジーの実現確率を80%、シナジー実現までの期間を3年と仮定、WACC 7%）","hint":"買い手の価値創造：シナジー × 達成確率の現在価値 - (買収価格 - スタンドアローン価値）をIRR目標で評価","answer":"最大買収価格：約380～390億円","steps":["Step 1：確実なシナジー = 100億円 × 80% = 80億円","Step 2：シナジーの現在価値 = 80億円 ÷ (1.07)^3 ≈ 65.3億円","Step 3：理論的な最大価格 = 300億円 + 65.3億円 = 365.3億円","Step 4：ただし、買い手が20%のリターンを要求する場合、シナジーの一部を自ら獲得する必要があり、売り手に付与できるシナジーは限定される","Step 5：保守的な仮定（シナジーの50%のみを売り手に付与）：300億円 + (65.3億円 × 50%) ≈ 333億円","Step 6：中庸な仮定：300億円 + (65.3億円 × 70%) ≈ 346億円","Step 7：妥当な買収価格レンジ：330～360億円。ただし、売り手の要求価格次第で最大390億円程度まで拡大可能"],"explanation":"【解法】買い手のM&A意思決定では、自らのIRR目標（20%）と対象会社のWACC（7%）の関係が重要です。内部収益率20%を達成するには、シナジーの現在価値よりも高い価値創造が必要。本ケースでは、確実に実現できるシナジー80億円の現在価値約65.3億円に基づき、買収価格は330～360億円が妥当です。ただし、売り手の期待価格（400億円等）が高い場合は、買い手のIRR目標を調整する必要が生じます。"},{"question":"M&Aの買収後の企業価値（EV）を、買収前EV1,000億円、購買統合シナジーの税引後現在価値150億円、売上増加シナジーの税引後現在価値50億円、統合関連費用の現在価値△20億円、PMI失敗リスク（20%確率で50%のシナジー喪失）を加味して、期待値ベースで計算してください。","hint":"期待値 = シナジー総額 × （1 - 失敗リスク確率 × 失敗時のシナジー喪失率） - 統合費用","answer":"買収後EV ≈ 1,180～1,200億円（期待値）","steps":["Step 1：基本的なシナジー総額 = 150億円 + 50億円 = 200億円","Step 2：PMI失敗リスク調整 = 20% × 50% = 10%のシナジー喪失リスク","Step 3：期待値シナジー = 200億円 × (1 - 10%) = 180億円","Step 4：統合関連費用 = △20億円","Step 5：買収後EV = 1,000億円 + 180億円 - 20億円 = 1,160億円","Step 6：ただし、実現確度90%を5年間で段階的実現と仮定すると、さらに割引率を適用：1,160億円 × 95%（5年の割引調整） ≈ 1,102億円","Step 7：保守的シナリオ：1,100～1,150億円、期待値シナリオ：1,160～1,180億円"],"explanation":"【解法】PMI失敗リスクを加味した買収後EV評価では、シナジーの確実性を反映させることが重要です。本ケースでは、200億円のシナジーに対し20%のPMI失敗リスク（50%のシナジー喪失）を反映すると、期待値シナジーは180億円に減少します。さらに統合費用20億円を控除すると、買収後の企業価値は1,160億円となります。実務では、シナジー実現タイミング（3年目から段階的）を更に反映する必要があります。"},{"question":"M&Aにおける3年間の累積シナジーが想定350億円（税引後）である場合、実績シナジーが初年度50億円、2年度120億円、3年度180億円に留まった場合の『シナジー実現度』と『説明責任対応』を分析してください。","hint":"累積実績 ÷ 累積計画 = 実現度、初年度の遅れが与える影響を分析","answer":"シナジー実現度：3年累計で約89%（計画350億円に対し実績350億円達成は3年終了時）ただし、初年度・2年度で遅延","steps":["Step 1：計画累積シナジー（3年） = 350億円","Step 2：実績累積シナジー（3年）= 50億円 + 120億円 + 180億円 = 350億円","Step 3：全体的な実現度 = 350億円 ÷ 350億円 = 100%達成","Step 4：ただし、年度別の達成度分析が重要：初年度50/100≈50%、2年度120/150≈80%、3年度180/150≈120%","Step 5：初年度の大幅な遅れ（50%）が、2年度・3年度の加速（120%）で補完された構図","Step 6：説明責任対応：初年度の遅れ理由（組織統合の複雑性、キーパーソン確保の課題等）を株主・ステークホルダーに説明が必須"],"explanation":"【解法】M&Aのシナジー実現は、計画と実績のギャップ管理が重要です。本ケースでは3年間の累積では計画を達成していますが、初年度の大幅な遅れ（50%）が懸念要因です。実務では、シナジーの初期段階での遅れが、その後の加速実現（2年度以降）で補われるケースが多く見られます。投資家への説明責任として、遅れの原因分析と今後の改善計画を明確に開示することが重要。特にPMI関連のリスク（キーパーソン流出、文化統合の遅延）が初期段階での遅れの主な原因であることが多いため、これらの対策の進捗を詳細に報告する必要があります。"}],"caseStudy":[{"title":"総合ケーススタディ1：EV/EBITDA法による買収価格と資金調達の最適化","scenario":"日本の大手食品メーカーX社は、ライバル企業のY社（非上場、高級食材取扱）を買収することを検討しています。X社の経営陣からは『最大でいくらまで出せるのか』という質問が上がっています。Y社の直近3年間のEBITDAは平均60億円で安定しており、市場ではEV/EBITDA倍率が7～9倍で評価されています。一方、Y社の有利子負債は120億円、現金は20億円です。X社は現在、自己資本1,500億円、有利子負債600億円、現金200億円を保有しており、D/Eレシオの目安が0.5倍です。","questions":["Y社に対する妥当な買収価格（複数シナリオ）を、EV/EBITDA倍率7倍・8倍・9倍それぞれで計算し、X社のD/Eレシオへの影響を分析してください。","買収価格が500億円と決定した場合、『手元現金を使う場合』と『借入で調達する場合』の2つのシナリオについて、財務指標（D/E、EPS希薄化、金利負担）への影響を比較してください。"],"modelAnswer":"【買収価格計算（EV/EBITDA 7倍・8倍・9倍）】EV7倍：EV=60×7=420億円、純有利子負債=120-20=100億円、株式価値=320億円。EV8倍：EV=480億円、株式価値=380億円。EV9倍：EV=540億円、株式価値=440億円。【買収後D/Eレシオへの影響】EV7倍（320億円買収）：新D/E=(600+100-200+120)÷1,500=0.35倍。EV8倍（380億円）：(600+150-200+120)÷1,500=0.39倍。EV9倍（440億円）：(600+200-200+120)÷1,500=0.43倍。X社の目安0.5倍を考えると、全シナリオで許容範囲。【買収価格500億円時の資金調達比較】①手元現金使用シナリオ：現金200億円+手元現金300億円を充当。買収後D/E=(600+150)÷1,500=0.5倍。EPS希薄化なし（借入なし）。②借入シナリオ：新規借入500億円。買収後D/E=(600+500+150-500)÷1,500=0.48倍。利息負担：500×2.5%=12.5億円（税引前）。税引後約8.75億円のEPS減少（約200万株換算）。→推奨：①手元現金活用+借入250億円で折衷案が最適（D/E 0.44倍、EPS影響最小化）。"},{"title":"総合ケーススタディ2：国際M&A（クロスボーダー）における契約・規制リスク対応","scenario":"日本の製造業大手Z社が、米国のテック企業W社（売上300億円、営業利益30億円、時価総額1,500億円）の買収を検討しています。買収価格は1,600億円を想定しており、以下のような規制・契約上の課題が存在します。①米国の外国投資委員会（CFIUS）の承認が必要（特に防衛関連部品が対象）②W社の主要顧客（3社で売上の40%）とのコントラクトにチェンジオブコントロール条項がある③W社の研究開発要員（100名）のうち、ビザ（H-1B）スポンサーシップが必要な者が30名③W社の知的財産（特許）が複数の国で登録されており、移転が必要。","questions":["CFIUS承認、チェンジオブコントロール対応、人材確保の3つのリスク領域について、SPA署名前に実施すべき対策と、クロージング条件として設定すべき項目を具体的に列挙してください。","もしチェンジオブコントロール条項により主要顧客3社との契約が失われた場合（売上120億円×営業利益率10%=12億円失失）、買収価格をいくら調整すべきか、及びSPAの補償条項にどのように反映させるべきかを提案してください。"],"modelAnswer":"【リスク対応・SPA前準備】①CFIUS：(a)W社の防衛関連事業の詳細確認と分社化検討(b)Z社のセキュリティポリシー提示(c)CFIUS事前相談（フォーマル・プロセス）実施。②チェンジオブコントロール：(a)3社との契約確認と変更条件の事前交渉(b)新たなスポンサーシップ契約の提案・合意(c)顧客の満足度調査と信頼構築。③人材：(a)ビザスポンサーシップ30名への処遇明確化(b)リテンション・ボーナス支給(c)キーエンジニアとの個別面談。【SPA条件】①CFIUS承認をクロージングの前提条件として明記②チェンジオブコントロール同意を基本合意までに取得②人材確保をDay 1前に確認。【買収価格調整＆補償】スタンドアローン価値：1,500億円。顧客喪失リスク（12億円×現在価値係数）≈60～80億円の価値毀損。SPA補償条項：「売上・利益保証表明」として、W社がチェンジオブコントロール同意未取得状態での売却責任を負う。補償上限：年間営業利益30億円の2年分（60億円）。Basket：5億円（軽微な顧客損失は対象外）。存続期間：3年。→買収価格修正案：1,600億円 - 30億円（顧客喪失リスク・保守的評価） = 1,570億円（または交渉で1,550～1,590億円レンジ）。"},{"title":"総合ケーススタディ3：M&A後の見直しと価値破壊要因への対応","scenario":"日本の小売業A社が3年前にB社を300億円で買収しました。買収時のシナジー予想は年間50億円でしたが、3年経過後の実績は以下の通りです。①初年度：シナジー10億円（計画比20%）②2年度：シナジー25億円（計画比50%）③3年度：シナジー30億円（計画比60%）。一方、のれんの減損テストを実施した結果、回収可能価値の低下により△40億円の減損が生じています。経営会議では『本買収は失敗ではないか』という懸念が出ており、CFOは以下の点を経営陣に説明する必要があります。","questions":["3年間のシナジー実現度（累積）を評価し、失敗要因の分析と改善計画を提案してください。","のれん△40億円の減損が生じた場合、①本買収のNPVが実現されているかの確認、②今後の方針（ホールド継続 vs. 売却検討）について、定量的な分析を提示してください。"],"modelAnswer":"【シナジー実現度評価】計画累積150億円（3年）に対し、実績累積65億円（10+25+30）= 実現度43%。大幅な計画未達。【失敗要因分析】①初年度の極端な遅れ（20%）：PMI体制の不備、キーパーソン流出。②2年度の改善（50%）：体制見直し後の回復。③3年度の部分的改善（60%）：ただし、仕切直しのため時間を要した。根本原因：(a)統合計画の不備(b)オーナーマインドの相違による文化衝突(c)システム統合の遅延。【改善計画】①100日プランの再実施（遅れた部分の加速）。②経営体制の強化（PMO廃止→事業部制への移行）。③シナジー達成ロードマップの公表（透明性確保）。【のれん減損分析】①買収資金300億円、のれん額：300 - 純資産（時価） ≈ 150億円（購買時推定）。②年間シナジー50億円想定 → 現実は年30～35億円程度（3年平均）。③WACC 7%での回収可能価値：累積シナジー期待値の現在価値 ≈ 350～400億円。本来の企業価値 ≈ 450～500億円。④買収価格300億円の妥当性：3年で60～75億円のシナジー獲得（ROI 20～25%/3年）。のれん△40億円の減損は、シナジー実現の遅延を反映したもの。【方針】ホールド継続が妥当。理由：(a)3年度でシナジーが改善傾向(b)売却時の価値毀損がさらに大きい(c)統合改善により4～5年度での完全回復が見込める。今後3年間のアクションプラン：年間シナジー50億円達成、のれん償却・回復を目指す。"}]}];

        // ==================== State Management ====================
        let currentView = 'dashboard';
        let currentChapter = null;
        let currentQuizIndex = 0;
        let currentQuizAnswers = [];
        let currentCalcIndex = 0;
        let studySessionStart = null;

        // ==================== Storage ====================
        function initStorage() {
            if (!localStorage.getItem('fm_progress')) {
                localStorage.setItem('fm_progress', JSON.stringify({
                    chapters: {},
                    lastChapter: null,
                    totalStudyTime: 0
                }));
            }
        }

        function getProgress() {
            return JSON.parse(localStorage.getItem('fm_progress') || '{}');
        }

        function saveProgress(progress) {
            localStorage.setItem('fm_progress', JSON.stringify(progress));
        }

        function getChapterProgress(chapterId) {
            const progress = getProgress();
            return progress.chapters[chapterId] || {
                completed: false,
                quizScore: 0,
                quizTotal: 0,
                lastStudied: null
            };
        }

        function updateChapterProgress(chapterId, updates) {
            const progress = getProgress();
            progress.chapters[chapterId] = {
                ...getChapterProgress(chapterId),
                ...updates,
                lastStudied: new Date().getTime()
            };
            saveProgress(progress);
        }

        function recordStudyTime(minutes) {
            const progress = getProgress();
            progress.totalStudyTime = (progress.totalStudyTime || 0) + minutes;
            saveProgress(progress);
        }

        // ==================== View Switching ====================
        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

            const viewMap = {
                'dashboard': 'dashboard-view',
                'chapter-list': 'chapter-list-view',
                'study-mode': 'study-mode-view',
                'results': 'results-view'
            };

            if (viewMap[viewName]) {
                document.getElementById(viewMap[viewName]).classList.add('active');
                event.target.closest('.nav-item').classList.add('active');
                currentView = viewName;

                if (viewName === 'dashboard') {
                    renderDashboard();
                } else if (viewName === 'chapter-list') {
                    renderChapterList();
                } else if (viewName === 'results') {
                    renderResults();
                }
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            const tabMap = {
                'learn': 'learn-tab',
                'quiz': 'quiz-tab',
                'calculation': 'calculation-tab',
                'case': 'case-tab'
            };

            if (tabMap[tabName]) {
                document.getElementById(tabMap[tabName]).classList.add('active');
                event.target.classList.add('active');
            }
        }

        // ==================== Dashboard ====================
        function renderDashboard() {
            const progress = getProgress();
            const chapters = ALL_CHAPTERS;

            if (chapters.length === 0) {
                document.getElementById('phase-cards-container').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">章がロードされていません</div></div>';
                return;
            }

            // Calculate statistics
            const completedCount = Object.values(progress.chapters).filter(p => p.completed).length;
            const scores = Object.values(progress.chapters).filter(p => p.quizTotal > 0).map(p => (p.quizScore / p.quizTotal) * 100);
            const averageScore = scores.length > 0 ? Math.round(scores.reduce((a, b) => a + b) / scores.length) : 0;
            const overallProgress = chapters.length > 0 ? Math.round((completedCount / chapters.length) * 100) : 0;

            // Update overall progress
            document.getElementById('overall-progress').style.width = overallProgress + '%';
            document.getElementById('overall-percentage').textContent = overallProgress + '%';
            document.getElementById('completed-count').textContent = completedCount;
            document.getElementById('average-score').textContent = scores.length > 0 ? averageScore + '%' : '-';

            // Update study time
            const studyMinutes = progress.totalStudyTime || 0;
            document.getElementById('study-time').textContent = studyMinutes + '分';
            const studyTimePercent = Math.min((studyMinutes / 120) * 100, 100); // 120 min target
            document.getElementById('study-time-bar').style.width = studyTimePercent + '%';

            // Render phase cards
            const phases = [
                { id: 1, title: 'Phase 1', name: '財務基礎・企業価値', color: '#6b7f5e' },
                { id: 2, title: 'Phase 2', name: 'コーポレートファイナンス', color: '#5a8a6a' },
                { id: 3, title: 'Phase 3', name: 'M&A実務', color: '#c08b3e' }
            ];

            let phaseHtml = '';
            phases.forEach(phase => {
                const phaseChapters = chapters.filter(ch => ch.phase === phase.id);
                const phaseCompleted = phaseChapters.filter(ch => getChapterProgress(ch.id).completed).length;
                const phaseProgress = phaseChapters.length > 0 ? Math.round((phaseCompleted / phaseChapters.length) * 100) : 0;

                phaseHtml += `
                    <div class="phase-card">
                        <div class="phase-title">${phase.title}</div>
                        <div class="phase-name">${phase.name}</div>
                        <div class="progress-bar" style="margin-bottom: 12px;">
                            <div class="progress-fill" style="width: ${phaseProgress}%; background: linear-gradient(90deg, ${phase.color}, ${phase.color}cc);"></div>
                        </div>
                        <div class="stat-item">
                            <span style="color: var(--text-secondary);">進捗</span>
                            <span class="stat-value">${phaseCompleted}/${phaseChapters.length}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('phase-cards-container').innerHTML = phaseHtml;

            // Resume button
            const lastChapter = progress.lastChapter;
            if (lastChapter) {
                const chapter = chapters.find(ch => ch.id === lastChapter);
                if (chapter) {
                    document.getElementById('resume-btn').style.display = 'flex';
                    document.getElementById('resume-text').textContent = `「${chapter.title}」を再開`;
                    document.getElementById('resume-btn').onclick = () => startChapter(lastChapter);
                }
            }
        }

        // ==================== Chapter List ====================
        function renderChapterList() {
            const chapters = ALL_CHAPTERS;
            if (chapters.length === 0) {
                document.getElementById('chapters-container').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">章がロードされていません</div></div>';
                return;
            }

            const phases = [1, 2, 3];
            let html = '';

            phases.forEach(phaseNum => {
                const phaseChapters = chapters.filter(ch => ch.phase === phaseNum);
                const phaseName = ['財務基礎・企業価値', 'コーポレートファイナンス', 'M&A実務'][phaseNum - 1];

                html += `
                    <div class="chapter-group">
                        <div class="group-header" onclick="toggleGroup(event)">
                            <div class="group-toggle">▼</div>
                            <div class="group-title">フェーズ ${phaseNum}: ${phaseName}</div>
                        </div>
                        <div class="group-chapters">
                `;

                phaseChapters.forEach(chapter => {
                    const chProgress = getChapterProgress(chapter.id);
                    const statusIcon = chProgress.completed ? '✓' : (chProgress.lastStudied ? '◐' : '🔒');
                    const statusClass = chProgress.completed ? 'completed' : (chProgress.lastStudied ? 'in-progress' : 'locked');
                    const scoreDisplay = chProgress.quizTotal > 0 ? `${Math.round((chProgress.quizScore / chProgress.quizTotal) * 100)}%` : '-';
                    const isSpecial = [6, 11, 20].includes(chapter.id);
                    const specialBadge = isSpecial ? '<span class="badge badge-special">総復習</span>' : '';

                    html += `
                        <div class="chapter-item" onclick="startChapter(${chapter.id})">
                            <div class="chapter-icon ${statusClass}">${statusIcon}</div>
                            <div class="chapter-info">
                                <div class="chapter-title">第${chapter.id}章 ${chapter.title}</div>
                                <div class="chapter-meta">${chapter.subtitle} ${specialBadge}</div>
                            </div>
                            <div class="chapter-score">${scoreDisplay}</div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            document.getElementById('chapters-container').innerHTML = html;
        }

        function toggleGroup(event) {
            const header = event.currentTarget;
            const toggle = header.querySelector('.group-toggle');
            const chapters = header.nextElementSibling;

            toggle.classList.toggle('collapsed');
            chapters.style.display = chapters.style.display === 'none' ? 'block' : 'none';
        }

        // ==================== Study Mode ====================
        function startChapter(chapterId) {
            const chapter = ALL_CHAPTERS.find(ch => ch.id === chapterId);
            if (!chapter) return;

            currentChapter = chapter;
            currentQuizIndex = 0;
            currentQuizAnswers = [];
            currentCalcIndex = 0;
            studySessionStart = new Date().getTime();

            // Update progress
            updateChapterProgress(chapterId, { lastStudied: new Date().getTime() });
            const progress = getProgress();
            progress.lastChapter = chapterId;
            saveProgress(progress);

            // Render study mode
            document.getElementById('study-chapter-title').textContent = `第${chapter.id}章 ${chapter.title}`;
            document.getElementById('study-chapter-subtitle').textContent = chapter.subtitle;

            renderLearnTab();
            renderQuizTab();
            renderCalculationTab();
            renderCaseTab();

            updateStudyNavigation();

            switchView('study-mode');
            switchTab('learn');
        }

        function renderLearnTab() {
            const chapter = currentChapter;
            let html = '';

            if (chapter.content) {
                html += `<div class="content-section">${chapter.content}</div>`;
            }

            if (chapter.keyPoints && chapter.keyPoints.length > 0) {
                html += `
                    <div class="key-points">
                        <div class="key-points-title">📌 重要ポイント</div>
                        <ul class="key-points-list">
                            ${chapter.keyPoints.map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            document.getElementById('learn-content').innerHTML = html;
        }

        function renderQuizTab() {
            const chapter = currentChapter;
            if (!chapter.quizzes || chapter.quizzes.length === 0) {
                document.getElementById('quiz-content').innerHTML = '<div class="empty-state"><div class="empty-icon">❓</div><div class="empty-text">クイズはありません</div></div>';
                return;
            }

            if (currentQuizIndex < chapter.quizzes.length) {
                const quiz = chapter.quizzes[currentQuizIndex];
                let html = `
                    <div class="quiz-container">
                        <div class="quiz-question">
                            <div class="quiz-progress">問 ${currentQuizIndex + 1}/${chapter.quizzes.length}</div>
                            <div class="quiz-question-text">${quiz.question}</div>
                            <div class="quiz-options">
                `;

                quiz.options.forEach((option, idx) => {
                    const isAnswered = currentQuizAnswers[currentQuizIndex] !== undefined;
                    const selectedIdx = currentQuizAnswers[currentQuizIndex];
                    const isCorrect = idx === quiz.answer;
                    let btnClass = '';

                    if (isAnswered) {
                        if (idx === selectedIdx && isCorrect) {
                            btnClass = 'correct';
                        } else if (idx === selectedIdx && !isCorrect) {
                            btnClass = 'incorrect';
                        } else if (isCorrect) {
                            btnClass = 'correct';
                        }
                    }

                    html += `
                        <button class="option-btn ${btnClass}"
                                ${isAnswered ? 'disabled' : ''}
                                onclick="answerQuiz(${idx})">
                            ${option}
                        </button>
                    `;
                });

                html += '</div>';

                if (currentQuizAnswers[currentQuizIndex] !== undefined) {
                    html += `
                        <div class="quiz-explanation">
                            <strong>解説:</strong> ${quiz.explanation}
                        </div>
                        <button class="btn btn-primary btn-block" style="margin-top: 12px;" onclick="nextQuiz()">
                            次の問題 →
                        </button>
                    `;
                }

                html += '</div>';
                document.getElementById('quiz-content').innerHTML = html;
            } else {
                renderQuizSummary();
            }
        }

        function answerQuiz(optionIdx) {
            currentQuizAnswers[currentQuizIndex] = optionIdx;
            renderQuizTab();
        }

        function nextQuiz() {
            currentQuizIndex++;
            renderQuizTab();
        }

        function renderQuizSummary() {
            const chapter = currentChapter;
            const correctCount = currentQuizAnswers.reduce((count, answer, idx) => {
                return count + (answer === chapter.quizzes[idx].answer ? 1 : 0);
            }, 0);
            const score = Math.round((correctCount / chapter.quizzes.length) * 100);

            // Save score
            updateChapterProgress(chapter.id, {
                quizScore: correctCount,
                quizTotal: chapter.quizzes.length
            });

            let html = `
                <div class="quiz-result">
                    <div class="result-score">${score}%</div>
                    <div class="result-message">
                        ${correctCount}/${chapter.quizzes.length} 問正解
                    </div>
                </div>
                <div class="quiz-summary">
                    <h3 style="margin-top: 0;">答案確認</h3>
            `;

            chapter.quizzes.forEach((quiz, idx) => {
                const userAnswer = currentQuizAnswers[idx];
                const isCorrect = userAnswer === quiz.answer;
                const status = isCorrect ? '✓' : '✗';
                const statusColor = isCorrect ? 'var(--success)' : 'var(--danger)';

                html += `
                    <div class="summary-item">
                        <div>
                            <span style="color: ${statusColor}; font-weight: 700; margin-right: 8px;">${status}</span>
                            <span>問${idx + 1}: ${quiz.question}</span>
                        </div>
                        <div style="color: ${statusColor}; font-weight: 600;">
                            ${isCorrect ? '正解' : '不正解'}
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <button class="btn btn-secondary btn-block" style="margin-top: 12px;" onclick="resetQuiz()">
                        もう一度チャレンジ
                    </button>
            `;

            document.getElementById('quiz-content').innerHTML = html;
        }

        function resetQuiz() {
            currentQuizIndex = 0;
            currentQuizAnswers = [];
            renderQuizTab();
        }

        function renderCalculationTab() {
            const chapter = currentChapter;
            if (!chapter.calculations || chapter.calculations.length === 0) {
                document.getElementById('calculation-content').innerHTML = '<div class="empty-state"><div class="empty-icon">🧮</div><div class="empty-text">計算問題はありません</div></div>';
                return;
            }

            const calc = chapter.calculations[currentCalcIndex];
            let html = `
                <div class="calc-question">
                    <div class="calc-question-text">${calc.question}</div>
                    <div class="hint-toggle" onclick="toggleHint(event)">
                        <input type="checkbox" class="hint-toggle-checkbox" id="hint-check">
                        <label for="hint-check" style="cursor: pointer; flex: 1; margin: 0;">ヒントを見る</label>
                    </div>
                    <div class="hint-content" id="hint-content">${calc.hint}</div>
                    <input type="text" class="answer-input" id="answer-input" placeholder="答えを入力してください">
                    <button class="btn btn-primary btn-block" onclick="checkCalculation()">解答を確認</button>
                    <div class="calc-solution" id="calc-solution">
                        <div class="solution-title">解答手順</div>
                        ${calc.steps.map(step => `<div class="solution-step">${step}</div>`).join('')}
                        <div class="solution-title">説明</div>
                        <div class="solution-step" style="border-bottom: none;">${calc.explanation}</div>
                    </div>
            `;

            if (currentCalcIndex < chapter.calculations.length - 1) {
                html += `
                    <button class="btn btn-secondary btn-block" style="margin-top: 12px;" onclick="nextCalculation()">
                        次の問題 →
                    </button>
                `;
            }

            html += '</div>';
            document.getElementById('calculation-content').innerHTML = html;
        }

        function toggleHint(event) {
            const checkbox = event.currentTarget.querySelector('.hint-toggle-checkbox');
            const hintContent = document.getElementById('hint-content');
            checkbox.checked = !checkbox.checked;
            hintContent.classList.toggle('show', checkbox.checked);
        }

        function checkCalculation() {
            const input = document.getElementById('answer-input').value.trim();
            const calc = currentChapter.calculations[currentCalcIndex];
            const solution = document.getElementById('calc-solution');

            if (input.toLowerCase() === calc.answer.toLowerCase()) {
                solution.classList.add('show');
                solution.style.borderColor = 'var(--success)';
                solution.innerHTML = `
                    <div style="padding: 12px; background: rgba(90, 138, 106, 0.12); border-radius: 6px; margin-bottom: 12px; color: var(--success); font-weight: 600;">✓ 正解です</div>
                    <div class="solution-title">解答手順</div>
                    ${calc.steps.map(step => `<div class="solution-step">${step}</div>`).join('')}
                    <div class="solution-title">説明</div>
                    <div class="solution-step" style="border-bottom: none;">${calc.explanation}</div>
                `;
            } else {
                solution.classList.add('show');
                solution.style.borderColor = 'var(--danger)';
                solution.innerHTML = `
                    <div style="padding: 12px; background: rgba(184, 84, 80, 0.1); border-radius: 6px; margin-bottom: 12px; color: var(--danger); font-weight: 600;">✗ もう一度試してください</div>
                    <div class="solution-title">解答手順</div>
                    ${calc.steps.map(step => `<div class="solution-step">${step}</div>`).join('')}
                    <div class="solution-title">説明</div>
                    <div class="solution-step" style="border-bottom: none;">${calc.explanation}</div>
                `;
            }

            document.getElementById('answer-input').disabled = true;
        }

        function nextCalculation() {
            currentCalcIndex++;
            renderCalculationTab();
        }

        function renderCaseTab() {
            const chapter = currentChapter;
            if (!chapter.caseStudy) {
                document.getElementById('case-content').innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">ケーススタディはありません</div></div>';
                return;
            }

            const caseStudy = chapter.caseStudy;
            let html = `
                <h3>${caseStudy.title}</h3>
                <div class="case-scenario">${caseStudy.scenario}</div>
                <h3 style="margin-top: 20px;">設問</h3>
                <div class="case-questions">
            `;

            caseStudy.questions.forEach((question, idx) => {
                const answerId = `case-answer-${idx}`;
                html += `
                    <div class="case-question-item">${idx + 1}. ${question}</div>
                    <div class="case-answer-toggle" onclick="toggleCaseAnswer(${idx})">
                        <span style="flex: 1;">模範解答を表示</span>
                        <div class="toggle-icon">▼</div>
                    </div>
                    <div class="case-answer" id="${answerId}">
                        ${caseStudy.modelAnswer[idx] || '解答準備中'}
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('case-content').innerHTML = html;
        }

        function toggleCaseAnswer(idx) {
            const answerId = `case-answer-${idx}`;
            const answer = document.getElementById(answerId);
            const toggle = answer.previousElementSibling;

            answer.classList.toggle('show');
            toggle.classList.toggle('open');
        }

        function updateStudyNavigation() {
            const chapters = ALL_CHAPTERS;
            const currentIdx = chapters.findIndex(ch => ch.id === currentChapter.id);

            document.getElementById('prev-chapter-btn').disabled = currentIdx === 0;
            document.getElementById('next-chapter-btn').disabled = currentIdx === chapters.length - 1;
        }

        function previousChapter() {
            const chapters = ALL_CHAPTERS;
            const currentIdx = chapters.findIndex(ch => ch.id === currentChapter.id);
            if (currentIdx > 0) {
                recordStudyTime(Math.round((new Date().getTime() - studySessionStart) / 60000));
                startChapter(chapters[currentIdx - 1].id);
            }
        }

        function nextChapter() {
            const chapters = ALL_CHAPTERS;
            const currentIdx = chapters.findIndex(ch => ch.id === currentChapter.id);
            if (currentIdx < chapters.length - 1) {
                recordStudyTime(Math.round((new Date().getTime() - studySessionStart) / 60000));
                startChapter(chapters[currentIdx + 1].id);
            }
        }

        function completeChapter() {
            recordStudyTime(Math.round((new Date().getTime() - studySessionStart) / 60000));
            updateChapterProgress(currentChapter.id, { completed: true });

            // Show confetti
            createConfetti();

            // Update and show success message
            setTimeout(() => {
                alert(`✓ 「第${currentChapter.id}章 ${currentChapter.title}」を完了しました！`);
                switchView('dashboard');
            }, 300);
        }

        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '50%';
                confetti.style.backgroundColor = ['var(--accent)', 'var(--success)', 'var(--warning)'][Math.floor(Math.random() * 3)];
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 2000);
            }
        }

        // ==================== Results ====================
        function renderResults() {
            const progress = getProgress();
            const chapters = ALL_CHAPTERS;

            if (chapters.length === 0) {
                document.getElementById('scores-tbody').innerHTML = '<tr><td colspan="2"><div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">章がロードされていません</div></div></td></tr>';
                return;
            }

            const scores = [];
            let totalScore = 0;
            let completedCount = 0;

            chapters.forEach(chapter => {
                const chProgress = getChapterProgress(chapter.id);
                if (chProgress.quizTotal > 0) {
                    const score = Math.round((chProgress.quizScore / chProgress.quizTotal) * 100);
                    scores.push(score);
                    totalScore += score;
                }
                if (chProgress.completed) {
                    completedCount++;
                }
            });

            const averageScore = scores.length > 0 ? Math.round(totalScore / scores.length) : 0;
            document.getElementById('total-score').textContent = averageScore + '%';
            document.getElementById('total-chapters').textContent = completedCount;

            // Scores table
            let tableHtml = '';
            chapters.forEach(chapter => {
                const chProgress = getChapterProgress(chapter.id);
                if (chProgress.quizTotal > 0) {
                    const score = Math.round((chProgress.quizScore / chProgress.quizTotal) * 100);
                    tableHtml += `
                        <tr>
                            <td>第${chapter.id}章 ${chapter.title}</td>
                            <td style="text-align: right;">
                                ${score}%
                                <div class="score-bar">
                                    <div class="score-bar-fill" style="width: ${score}%;"></div>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            });

            if (tableHtml === '') {
                tableHtml = '<tr><td colspan="2" style="text-align: center; color: var(--text-secondary); padding: 24px;">クイズをまだ完了していません</td></tr>';
            }

            document.getElementById('scores-tbody').innerHTML = tableHtml;

            // Weak areas
            const weakAreas = scores.filter(s => s < 70).length;
            const weakChapters = chapters.filter(ch => {
                const p = getChapterProgress(ch.id);
                return p.quizTotal > 0 && (p.quizScore / p.quizTotal) * 100 < 70;
            });

            let weakAreasHtml = '';
            if (weakChapters.length > 0) {
                weakAreasHtml = '<div style="margin-bottom: 16px;">';
                weakChapters.forEach(ch => {
                    const p = getChapterProgress(ch.id);
                    const score = Math.round((p.quizScore / p.quizTotal) * 100);
                    weakAreasHtml += `
                        <div class="card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <div>
                                <div style="font-weight: 600; margin-bottom: 4px;">第${ch.id}章 ${ch.title}</div>
                                <div style="font-size: 13px; color: var(--text-secondary);">スコア: ${score}%</div>
                            </div>
                            <button class="btn btn-secondary btn-small" onclick="startChapter(${ch.id})">
                                再挑戦
                            </button>
                        </div>
                    `;
                });
                weakAreasHtml += '</div>';
            } else {
                weakAreasHtml = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">すべての章で70%以上達成しました</div></div>';
            }

            document.getElementById('weak-areas-container').innerHTML = weakAreasHtml;
        }

        // ==================== Settings ====================
        function openSettings() {
            document.getElementById('settings-modal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('active');
        }

        function resetProgress() {
            if (confirm('本当にすべての進捗をリセットしますか？この操作は取り消せません。')) {
                localStorage.clear();
                initStorage();
                alert('進捗がリセットされました。');
                renderDashboard();
                closeSettings();
            }
        }

        function exportProgress() {
            const progress = getProgress();
            const dataStr = JSON.stringify(progress, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `fm-progress-${new Date().getTime()}.json`;
            link.click();
            alert('進捗がエクスポートされました。');
        }

        // ==================== Initialize ====================
        function init() {
            initStorage();
            renderDashboard();

            // Close modal on outside click
            document.getElementById('settings-modal').addEventListener('click', (e) => {
                if (e.target.id === 'settings-modal') {
                    closeSettings();
                }
            });
        }

        // Start app
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
