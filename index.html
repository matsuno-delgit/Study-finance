<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f0e8">
    <title>ファイナンス・M&A プロフェッショナル研修</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f0e8;
            --bg-secondary: #ffffff;
            --bg-tertiary: #ede8df;
            --accent: #6b7f5e;
            --accent-dark: #556b49;
            --success: #5a8a6a;
            --success-dark: #487058;
            --warning: #c08b3e;
            --danger: #b85450;
            --text-primary: #2c2c2c;
            --text-secondary: #6b6560;
            --border: #d5cec4;
            --shadow: rgba(90, 70, 50, 0.1);
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: max(1rem, env(safe-area-inset-top)) 1rem 80px max(1rem, env(safe-area-inset-left));
            max-width: 640px;
            margin: 0 auto;
            width: 100%;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .content-area::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: max(60px, calc(60px + env(safe-area-inset-bottom)));
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            box-shadow: 0 -2px 8px rgba(90, 70, 50, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 8px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px;
            border: none;
            background: none;
            color: var(--text-secondary);
            transition: color 0.3s ease;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Typography */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            margin-top: 24px;
            margin-bottom: 12px;
        }

        h3 {
            font-size: 18px;
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        p {
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px var(--shadow);
            transition: background 0.2s ease;
        }

        .card:active {
            background: var(--bg-tertiary);
        }

        /* Buttons */
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:active {
            background: var(--accent-dark);
        }

        .btn-secondary {
            background: #ffffff;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:active {
            background: #f7f3ec;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:active {
            background: var(--success-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:active {
            background: #a04744;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 14px;
            min-height: 40px;
        }

        .btn-block {
            width: 100%;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e8e2d8;
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        /* Phase Cards */
        .phase-card {
            background: linear-gradient(135deg, #ffffff, #f7f3ec);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .phase-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .phase-name {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .stat-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            margin-right: 16px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-weight: 600;
            color: var(--accent);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(90, 138, 106, 0.15);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(192, 139, 62, 0.15);
            color: var(--warning);
        }

        .badge-special {
            background: rgba(139, 115, 85, 0.15);
            color: #8b7355;
        }

        /* Chapter List */
        .chapter-group {
            margin-bottom: 20px;
        }

        .group-header {
            display: flex;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .group-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            transition: transform 0.2s ease;
        }

        .group-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .group-title {
            font-weight: 600;
            flex: 1;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            gap: 12px;
            box-shadow: 0 1px 2px var(--shadow);
        }

        .chapter-item:active {
            background: #f7f3ec;
        }

        .chapter-icon {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .chapter-icon.locked {
            background: rgba(107, 101, 96, 0.1);
        }

        .chapter-icon.completed {
            background: rgba(90, 138, 106, 0.12);
            color: var(--success);
        }

        .chapter-icon.in-progress {
            background: rgba(107, 127, 94, 0.12);
            color: var(--accent);
        }

        .chapter-info {
            flex: 1;
            min-width: 0;
        }

        .chapter-title {
            font-weight: 600;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .chapter-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chapter-score {
            text-align: right;
            white-space: nowrap;
            font-size: 13px;
        }

        /* Study Mode */
        .study-header {
            background: linear-gradient(135deg, #ffffff, #f7f3ec);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px var(--shadow);
        }

        .study-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .study-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tab-bar::-webkit-scrollbar {
            height: 4px;
        }

        .tab-bar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .tab-btn {
            padding: 8px 16px;
            background: #ffffff;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.2s ease-in-out;
        }

        /* Content Section */
        .content-section {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            line-height: 1.8;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .content-section h3 {
            margin-top: 12px;
        }

        .content-section p {
            margin-bottom: 12px;
        }

        .content-section ul,
        .content-section ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .content-section li {
            margin-bottom: 6px;
        }

        .content-section table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 14px;
        }

        .content-section table th,
        .content-section table td {
            padding: 8px 10px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .content-section table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--accent);
        }

        .content-section table tr:nth-child(even) td {
            background: rgba(107, 127, 94, 0.04);
        }

        /* Key Points */
        .key-points {
            background: linear-gradient(135deg, rgba(107, 127, 94, 0.1), rgba(90, 138, 106, 0.08));
            border-left: 4px solid var(--accent);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .key-points-title {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .key-points-list {
            list-style: none;
        }

        .key-points-list li {
            padding: 6px 0;
            font-size: 14px;
            color: var(--text-primary);
            position: relative;
            padding-left: 20px;
        }

        .key-points-list li:before {
            content: "▪";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        /* Quiz */
        .quiz-container {
            margin-bottom: 16px;
        }

        .quiz-question {
            background: linear-gradient(135deg, #ffffff, #f7f3ec);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .quiz-question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .quiz-progress {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-btn {
            padding: 12px;
            background: #ffffff;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            min-height: 44px;
        }

        .option-btn:active {
            border-color: var(--accent);
            background: #f7f3ec;
        }

        .option-btn.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        .option-btn.correct {
            background: var(--success);
            border-color: var(--success);
            color: #ffffff;
        }

        .option-btn.incorrect {
            background: rgba(184, 84, 80, 0.12);
            border-color: var(--danger);
            color: var(--danger);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .quiz-explanation {
            background: rgba(107, 127, 94, 0.08);
            border-left: 4px solid var(--accent);
            border-radius: 6px;
            padding: 12px;
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .quiz-result {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .result-score {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .result-message {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .quiz-summary {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        /* Calculation Problem */
        .calc-question {
            background: linear-gradient(135deg, #ffffff, #f7f3ec);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .calc-question-text {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .hint-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px;
            margin-bottom: 12px;
            user-select: none;
        }

        .hint-toggle-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .hint-content {
            background: rgba(192, 139, 62, 0.1);
            border-left: 4px solid var(--warning);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            display: none;
        }

        .hint-content.show {
            display: block;
        }

        .answer-input {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            border: 2px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 15px;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }

        .answer-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(107, 127, 94, 0.15);
        }

        .calc-solution {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-top: 12px;
            display: none;
        }

        .calc-solution.show {
            display: block;
        }

        .solution-step {
            padding: 8px 0;
            font-size: 14px;
            line-height: 1.6;
            font-family: 'Courier New', monospace;
            border-bottom: 1px solid var(--border);
        }

        .solution-step:last-child {
            border-bottom: none;
        }

        .solution-title {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            margin-top: 8px;
        }

        /* Case Study */
        .case-scenario {
            background: #ffffff;
            border-left: 4px solid var(--accent);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.8;
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
        }

        .case-questions {
            margin-bottom: 16px;
        }

        .case-question-item {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .case-answer-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            user-select: none;
            font-weight: 600;
        }

        .case-answer-toggle.open {
            background: var(--bg-tertiary);
        }

        .toggle-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            transition: transform 0.2s ease;
        }

        .case-answer-toggle.open .toggle-icon {
            transform: rotate(180deg);
        }

        .case-answer {
            background: linear-gradient(135deg, rgba(90, 138, 106, 0.08), rgba(107, 127, 94, 0.06));
            border-left: 4px solid var(--success);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.8;
            display: none;
        }

        .case-answer.show {
            display: block;
        }

        /* Study Navigation */
        .study-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .study-nav-btn {
            flex: 1;
        }

        .study-footer {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .study-footer-btn {
            flex: 1;
        }

        /* Results/Stats */
        .stats-container {
            margin-bottom: 16px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff, #f7f3ec);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: center;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .stat-big-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
        }

        .scores-table {
            width: 100%;
            border-collapse: collapse;
        }

        .scores-table th,
        .scores-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .scores-table th {
            font-weight: 600;
            color: var(--accent);
            background: #f7f3ec;
        }

        .scores-table tr:last-child td {
            border-bottom: none;
        }

        .score-bar {
            width: 100%;
            height: 6px;
            background: #e8e2d8;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* Settings/Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(44, 44, 44, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-in-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            box-shadow: 0 8px 32px rgba(90, 70, 50, 0.2);
            overflow-y: auto;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-actions-btn {
            flex: 1;
        }

        /* Settings */
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-weight: 600;
            font-size: 15px;
        }

        /* Completion Animation */
        @keyframes confetti {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: confetti 2s ease-out forwards;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .content-area {
                padding: max(2rem, env(safe-area-inset-top)) 2rem 100px max(2rem, env(safe-area-inset-left));
            }

        /* Loading State */

    <script>
        // ==================== Data ====================
        const ALL_CHAPTERS = [{"id":1,"title":"財務諸表の基礎①","subtitle":"P/L・B/S・C/Fの構造と読み方","phase":1,"content":"<h3>第1章 財務諸表の役割と体系</h3>\n<p>財務諸表は、企業の「健康診断書」とも呼ばれ、企業の財政状態、経営成績、およびキャッシュフローの状況を、利害関係者に報告するために作成される書類です。</p>\n<h4>財務諸表の主な利用者</h4>\n<table border=\"1\" cellpadding=\"10\">\n<tr><th>利用者</th><th>主な関心事項</th></tr>\n<tr><td>株主・投資家</td><td>企業の収益性、成長性、配当可能利益</td></tr>\n<tr><td>債権者・銀行</td><td>返済能力、財務の安全性</td></tr>\n<tr><td>経営者</td><td>経営戦略の成果、改善点の把握</td></tr>\n<tr><td>取引先</td><td>取引継続の可能性、支払能力</td></tr>\n</table>\n<h3>第2章 損益計算書（P/L）の構造と分析</h3>\n<h4>段階別利益構造</h4>\n<p><strong>売上高 − 売上原価 = 売上総利益（粗利）</strong></p>\n<p><strong>売上総利益 − 販売費及び一般管理費 = 営業利益</strong></p>\n<p><strong>営業利益 ± 営業外収益/費用 = 経常利益</strong></p>\n<p><strong>経常利益 ± 特別利益/損失 = 税引前当期純利益</strong></p>\n<p><strong>税引前当期純利益 − 法人税等 = 当期純利益</strong></p>\n<h4>各利益の意味</h4>\n<ul>\n<li><strong>売上総利益</strong>：製品・サービスの基本的な収益力を示す（粗利率の業界比較が重要）</li>\n<li><strong>営業利益</strong>：本業の収益力を示す最重要指標（営業利益率10%以上が優良とされる）</li>\n<li><strong>経常利益</strong>：経常的な企業活動全体の収益力を示す</li>\n<li><strong>当期純利益</strong>：株主に帰属する最終利益（配当やEPSの基礎）</li>\n</ul>\n<h3>第3章 貸借対照表（B/S）の構造と分析</h3>\n<h4>貸借対照表等式</h4>\n<p><strong>資産 = 負債 + 純資産</strong></p>\n<h4>資産の分類</h4>\n<table border=\"1\" cellpadding=\"10\">\n<tr><th>流動資産</th><th>固定資産</th></tr>\n<tr><td>現金及び預金</td><td>有形固定資産（建物、機械）</td></tr>\n<tr><td>売掛金</td><td>無形固定資産（のれん、特許）</td></tr>\n<tr><td>棚卸資産</td><td>投資その他の資産</td></tr>\n</table>\n<h4>負債と純資産</h4>\n<p><strong>流動負債</strong>：1年以内に返済・支払が必要（買掛金、短期借入金）</p>\n<p><strong>固定負債</strong>：返済期限が1年超（長期借入金、社債）</p>\n<p><strong>純資産（自己資本）</strong>：資本金、資本剰余金、利益剰余金</p>\n<h3>第4章 キャッシュフロー計算書（C/F）の構造と分析</h3>\n<h4>3つの活動区分</h4>\n<p><strong>営業活動によるキャッシュフロー（OCF）</strong>：本業による現金の創出力を示す</p>\n<p><strong>投資活動によるキャッシュフロー（ICF）</strong>：設備投資や有価証券取得による現金の動き</p>\n<p><strong>財務活動によるキャッシュフロー（FCF）</strong>：資金調達と返済、配当支払いによる現金の動き</p>\n<h4>フリーキャッシュフロー（FCF）</h4>\n<p><strong>フリーキャッシュフロー = 営業CF + 投資CF</strong></p>\n<p>FCFがプラスであれば、借入返済や配当、自社株買いなど株主還元に充てる余力があることを意味します。</p>\n<h3>第5章 三表の相互関係</h3>\n<p><strong>P/L → B/S</strong>：当期純利益がB/Sの利益剰余金を増加させる</p>\n<p><strong>B/S → C/F</strong>：現金及び預金の期首残高 + C/Fの合計 = 期末残高</p>\n<p><strong>P/L → C/F</strong>：当期純利益を起点に、非資金項目と運転資本の増減を調整</p>","keyPoints":["財務諸表は企業の健康診断書。P/L・B/S・C/Fの3つの基本書類がある","損益計算書は5段階の利益構造（売上総利益→営業利益→経常利益→税引前利益→当期純利益）","貸借対照表等式：資産 = 負債 + 純資産。資金の調達源泉を示す","キャッシュフロー計算書は利益と現金が異なることを明示する重要な書類","三表は独立しておらず相互に関連。運転資本の増加は営業CFをマイナスに影響させる"],"quizzes":[{"question":"損益計算書に表示される5つの利益について、最も正確な説明はどれですか？","options":["売上総利益は営業活動の効率性、営業利益は本業の収益力、経常利益は財務活動を含めた全体の収益力を示す","すべての利益は営業活動から生じるため、計算方法に大きな違いはない","当期純利益が最も重要で、他の利益は参考値に過ぎない","特別利益・損失は会計操作であり、分析時には除外すべき"],"answer":0,"explanation":"【解法】損益計算書の利益は段階的に算出されます。売上総利益は製品の基本的な収益力、営業利益は本業の収益力（販管費控除後）、経常利益は営業外収益・費用を含めた全体の収益力を示します。これらは段階的に企業の経営成績を多角的に分析するために設計されています。特別損益は臨時的な項目であり、継続的な収益力を評価する際には区別する必要があります。"},{"question":"貸借対照表等式「資産 = 負債 + 純資産」について、最も適切な説明はどれですか？","options":["企業が保有する資産の総額は、その調達源泉（他人資本と自己資本）の総額と必ず一致する","資産と負債の合計が純資産に等しいという意味である","負債を返済すれば資産が減少し、純資産が増加する関係を示す","資産と負債は独立しており、純資産との関係は時間とともに変動する"],"answer":0,"explanation":"【解法】貸借対照表等式は複式簿記の原理に基づいています。企業が保有するすべての資産は、必ず何らかの方法で調達された資金によって取得されており、その調達源泉は他人資本（負債）か自己資本（純資産）のいずれかです。したがって、資産の総額は調達源泉の総額と必ず一致します。この等式は企業のすべての取引で常に成り立つため、基本中の基本です。"},{"question":"キャッシュフロー計算書の3つの活動区分のうち、成長企業では通常どのパターンが見られますか？","options":["営業CF＋、投資CF−、財務CF−（本業で稼ぎ、投資して、借入返済・配当）","営業CF＋、投資CF−、財務CF＋（本業と借入で大型投資を実施）","営業CF＋、投資CF＋、財務CF−（資産売却で借入返済）","営業CF−、投資CF＋、財務CF＋（危機的状況で資産売却と借入）"],"answer":1,"explanation":"【解法】成長企業は大型投資を実施する必要があるため、本業での営業CFと外部からの借入による財務CFで、投資活動に必要な資金を調達します。すなわち営業CF＋、投資CF−、財務CF＋となります。一方、営業CF＋、投資CF−、財務CF−は安定成長企業のパターンで、本業で稼いだ現金で投資と株主還元の両立が可能な状態です。キャッシュフローのパターンは企業の成長段階や戦略を示す重要な指標です。"},{"question":"運転資本と現金フローの関係について、最も正確な説明はどれですか？","options":["運転資本の増加は現金の固定化を意味し、営業キャッシュフローにマイナスの影響がある","運転資本は貸借対照表にのみ表示され、キャッシュフロー計算書には影響しない","運転資本の増加でも減少でも、キャッシュフローに同じ影響を与える","売上が成長しても、運転資本が同じであれば現金流出の心配はない"],"answer":0,"explanation":"【解法】運転資本は営業活動に必要な資金です。売上が成長する際、通常、売掛金や棚卸資産も増加するため、運転資本は増加します。この増加は現金が営業資産に固定化されることを意味し、営業キャッシュフロー計算では減額調整されます。つまり、利益が出ていても運転資本の急激な増加により、実際の現金が不足する「黒字倒産」の原因となることがあります。この関係を理解することは経営企画部の実務で極めて重要です。"},{"question":"有価証券報告書から財務分析を行う際、最も重視すべき項目はどれですか？","options":["MD&A（経営成績の分析）を読み、経営者の視点を把握した上で、セグメント情報で事業構成を確認し、財務諸表の主要項目の増減理由を注記で確認する","最新の貸借対照表の資産額だけを確認すれば、企業の実態は把握できる","法人税の支払額だけを確認して、利益の質を判定できる","売上高の最新値と前年比だけで十分に企業評価ができる"],"answer":0,"explanation":"【解法】有価証券報告書の実践的な読み方は段階的です。第1に経営者の視点を把握するためMD&Aを読みます。第2にセグメント情報で事業構成を理解します。第3に主要な財務指標のトレンドを確認します。第4に財務諸表の増減理由を注記で確認します。最後にリスク情報を確認して潜在的な問題を把握します。このプロセスを通じて、数値の背後にある事業実態を立体的に理解することが重要です。"},{"question":"複数の製造業企業を比較分析する際、単純な売上高だけでなく営業利益率を比較する理由は何ですか？","options":["営業利益率は企業の本業の収益力を示し、規模による影響を除いて企業の競争力を比較できるため","営業利益率が高いほど必ず企業価値が高いという絶対的な指標であるため","財務諸表の注記に営業利益率が記載されているため参考にすべきであるため","売上高は信頼性が低く、営業利益率だけが信頼できる指標であるため"],"answer":0,"explanation":"【解法】売上高だけでは企業の規模を示すのみで、経営効率の良し悪しは判定できません。営業利益率は売上高に対する本業の収益力を示す相対指標であり、規模の異なる企業間でも公正に比較できます。例えば、売上高1,000億円で営業利益100億円の企業（利益率10%）と、売上高100億円で営業利益10億円の企業（利益率10%）では、利益率は同じですが、規模と収益力の構造は大きく異なります。相対指標を組み合わせることで、企業の真の競争力が見えます。"},{"question":"営業活動によるキャッシュフローと当期純利益が異なる主な理由として、最も重要なものはどれですか？","options":["利益は発生主義に基づき、キャッシュフローは現金主義に基づくため、売上債権や棚卸資産、仕入債務の増減、および減価償却などの非資金項目が影響する","キャッシュフロー計算書が不正確であり、利益の方が信頼できるため","営業活動と投資活動の区分が異なるため、同じ金額になることはない","キャッシュフローには税金が含まれないため、利益よりも常に高くなる"],"answer":0,"explanation":"【解法】P/Lは発生主義に基づいており、実際の現金入出金と無関係に収益と費用を認識します。例えば、売上計上しても代金回収がなければ現金は増えません（売掛金増加）。一方、C/Fは現金主義に基づいており、実際の現金の流出入を示します。営業CFと純利益を調整する主要な項目は：減価償却費（非資金費用の加算）、売上債権の増減（回収遅延の影響）、棚卸資産の増減（在庫投資の影響）、仕入債務の増減（支払延期の効果）などです。この差異を理解することが企業の資金繰りを正確に把握するために不可欠です。"}],"calculations":[{"question":"A社の財務データ：売上高1,000億円、売上原価700億円、販売費及び一般管理費150億円、営業外収益20億円、営業外費用10億円、法人税等25億円の場合、P/Lの5つの利益をすべて計算してください。","hint":"段階的に計算します。売上総利益 = 売上高 − 売上原価、営業利益 = 売上総利益 − 販管費という順序で進めます。","answer":"売上総利益300億円、営業利益150億円、経常利益160億円、税引前当期純利益160億円、当期純利益135億円","steps":["Step1: 売上総利益 = 売上高 − 売上原価 = 1,000 − 700 = 300億円","Step2: 営業利益 = 売上総利益 − 販売費及び一般管理費 = 300 − 150 = 150億円","Step3: 経常利益 = 営業利益 + 営業外収益 − 営業外費用 = 150 + 20 − 10 = 160億円","Step4: 税引前当期純利益 = 経常利益（特別利益/損失がないため）= 160億円","Step5: 当期純利益 = 税引前当期純利益 − 法人税等 = 160 − 25 = 135億円"],"explanation":"P/Lの5つの利益は段階的に計算されます。各段階で異なる視点が反映されており、売上総利益は製品の基本的な収益力、営業利益は本業の収益力、経常利益は全体の経常的収益力を示します。営業外項目（受取利息、支払利息など）を含めることで、財務レバレッジの影響を分離して分析できます。"},{"question":"B社の期末貸借対照表から：流動資産600億円、固定資産400億円、流動負債300億円、固定負債200億円の場合、自己資本を計算してください。また、自己資本比率とD/Eレシオも算出してください。","hint":"貸借対照表等式を使用します。自己資本 = 総資産 − 総負債です。","answer":"自己資本500億円、自己資本比率50%、D/Eレシオ1.0倍","steps":["Step1: 総資産 = 流動資産 + 固定資産 = 600 + 400 = 1,000億円","Step2: 総負債 = 流動負債 + 固定負債 = 300 + 200 = 500億円","Step3: 自己資本 = 総資産 − 総負債 = 1,000 − 500 = 500億円","Step4: 自己資本比率 = 自己資本 ÷ 総資産 × 100% = 500 ÷ 1,000 × 100% = 50%","Step5: D/Eレシオを求めるには有利子負債が必要ですが、ここでは総負債で代用：500 ÷ 500 = 1.0倍"],"explanation":"貸借対照表等式から自己資本を導出します。自己資本比率50%は標準的な水準であり、企業の財務安定性が適度であることを示しています。D/Eレシオ1.0倍も標準的な水準で、負債と自己資本がバランスしている状態です。"},{"question":"C社のキャッシュフロー計算書から：営業CFが200億円、投資CFが−150億円（設備投資150億円）、財務CFが−30億円（配当30億円）、期首現金残高が100億円の場合、期末現金残高はいくらですか？","hint":"期末現金残高 = 期首残高 + 営業CF + 投資CF + 財務CF です。","answer":"期末現金残高は120億円","steps":["Step1: 各活動によるキャッシュフロー合計 = 営業CF + 投資CF + 財務CF","Step2: = 200 + (−150) + (−30) = 20億円","Step3: 期末現金残高 = 期首現金残高 + CF合計 = 100 + 20 = 120億円"],"explanation":"キャッシュフロー計算書は企業の現金の流出入を追跡します。営業CFがプラスで本業から現金が創出され、投資CFがマイナスで成長投資が実施され、財務CFがマイナスで株主配当が支払われた状況です。この企業のパターン（営業CF＋、投資CF−、財務CF−）は優良企業のパターンを示しています。"}],"caseStudy":{"title":"総合商社の三表分析","scenario":"大型総合商社のM&A候補企業を分析しています。該当企業は売上高2,000億円、営業利益200億円の大手商社です。P/L分析では営業利益率が10%で業界平均並み。しかし、B/Sでは売掛金が異常に増加（売上債権回転期間が60日超）し、C/Fでは営業CFが利益よりも大幅に低い状況が見られます。","questions":["この企業の業績は健全に見えるが、三表の分析から何が読み取れますか？","売掛金の増加とキャッシュフロー悪化の関係を説明し、経営上の懸念点を指摘してください。"],"modelAnswer":"【分析】P/Lでは営業利益率10%で業界平均並みの水準に見えますが、三表を統合的に分析すると資金繰りに懸念があります。\n\n【B/Sの読み取り】売掛金の増加は、売上が売上債権として滞留していることを示しています。売上債権回転期間が60日超は、販売から代金回収までに2ヶ月以上かかることを意味し、その間、資金が顧客に貸している状態です。\n\n【C/Fの分析】営業CFが利益より低い理由は、売掛金増加がC/F計算で減額調整されるためです。例えば、営業利益200億円でも、売掛金が50億円増加すれば、営業CFは150億円程度に圧縮されます。\n\n【経営上の懸念】\n1. 資金繰りの逼迫：利益が出ていても現金が不足する可能性\n2. 運転資本の増大：売上成長に伴い、必要運転資本がさらに増加する恐れ\n3. 信用リスク：売上債権の回収リスクが高い可能性\n\n【推奨対応】売上債権管理の強化、与信審査の厳格化、回収条件の改善、ファクタリングの活用など、運転資本効率化が急務です。M&A後の統合における重要な改善テーマになります。"}},{"id":2,"title":"財務諸表の基礎②","subtitle":"財務指標分析の実践","phase":1,"content":"<h3>第1章 財務指標分析の基本フレームワーク</h3>\n<p>財務指標分析は、財務諸表の数値を加工して比率などの指標を算出し、企業の財務状況を多角的に評価する手法です。</p>\n<h4>財務指標の3つの視点</h4>\n<table border=\"1\" cellpadding=\"10\">\n<tr><th>視点</th><th>評価内容</th><th>主な指標</th></tr>\n<tr><td>収益性</td><td>いかに効率的に利益を稼いでいるか</td><td>ROE、ROA、売上高利益率</td></tr>\n<tr><td>安全性</td><td>財務的にどれだけ安定しているか</td><td>自己資本比率、流動比率、D/Eレシオ</td></tr>\n<tr><td>効率性</td><td>資産をいかに効率的に活用しているか</td><td>総資産回転率、棚卸資産回転率、CCC</td></tr>\n</table>\n<h3>第2章 収益性指標</h3>\n<h4>ROE（自己資本利益率）</h4>\n<p><strong>ROE = 当期純利益 ÷ 自己資本 × 100%</strong></p>\n<p>株主が投下した資本に対してどれだけの利益を生み出したかを示す最重要指標。伊藤レポートでは8%以上が求められています。</p>\n<h4>デュポン分析（ROEの分解）</h4>\n<p><strong>ROE = 売上高純利益率 × 総資産回転率 × 財務レバレッジ</strong></p>\n<p>ROEの改善要因を特定できます。利益率で稼ぐか、資産効率で稼ぐか、レバレッジで稼ぐかを判定できます。</p>\n<h4>ROA（総資産利益率）</h4>\n<p><strong>ROA = 当期純利益 ÷ 総資産 × 100%</strong></p>\n<p>資本構成の影響を受けないため、異なる資本構成を持つ企業間の比較に適しています。</p>\n<h3>第3章 安全性指標</h3>\n<h4>自己資本比率</h4>\n<p><strong>自己資本比率 = 自己資本 ÷ 総資産 × 100%</strong></p>\n<p>企業の財務的安定性を測る最も基本的な指標。50%以上が理想、20%未満は低い水準です。</p>\n<h4>D/Eレシオ（負債資本倍率）</h4>\n<p><strong>D/Eレシオ = 有利子負債 ÷ 自己資本</strong></p>\n<p>財務レバレッジの程度を測ります。0.5〜1.0倍が標準的な水準です。</p>\n<h4>流動比率と当座比率</h4>\n<p><strong>流動比率 = 流動資産 ÷ 流動負債 × 100%</strong>（200%以上が理想）</p>\n<p><strong>当座比率 = 当座資産 ÷ 流動負債 × 100%</strong>（100%以上が理想）</p>\n<h3>第4章 効率性指標</h3>\n<h4>総資産回転率</h4>\n<p><strong>総資産回転率 = 売上高 ÷ 総資産（回）</strong></p>\n<p>企業が保有する資産をどれだけ効率的に活用して売上を生み出しているかを示します。</p>\n<h4>運転資本効率：CCC（キャッシュ・コンバージョン・サイクル）</h4>\n<p><strong>CCC = 売上債権回転期間 + 棚卸資産回転期間 − 仕入債務回転期間</strong></p>\n<p>仕入から販売代金回収までに要する日数。短いほど効率的です。</p>\n<h3>第5章 成長性指標と配当関連指標</h3>\n<h4>PER（株価収益率）とPBR（株価純資産倍率）</h4>\n<p><strong>PER = 株価 ÷ EPS</strong>（投資回収年数の目安）</p>\n<p><strong>PBR = 株価 ÷ BPS</strong>（解散価値との比較）</p>","keyPoints":["財務指標分析は収益性・安全性・効率性の3つの視点から企業を評価する","ROE = 利益率 × 回転率 × レバレッジというデュポン分析で改善要因を特定できる","自己資本比率50%、D/Eレシオ1.0倍が標準的な水準。業界特性を考慮が重要","流動比率・当座比率は短期的な支払能力を示す。特に棚卸資産に依存した流動性構造は注意が必要","CCC（キャッシュ・コンバージョン・サイクル）の短縮が運転資本効率化の鍵"],"quizzes":[{"question":"デュポン分析で、売上高純利益率が低くても、総資産回転率が高い企業があります。このような企業の特徴として最も適切なものはどれですか？","options":["小売業など薄利多売型ビジネスモデル。少ない利益率でも高い回転率で ROE を確保している","製造業として利益率が低いため、経営が危機的状態にある","財務レバレッジが高すぎて、本来の収益力を隠している","固定資産が多すぎて、資産効率が低下している"],"answer":0,"explanation":"【解法】デュポン分析は ROE の源泉を明確にします。利益率が低い（例：5%）でも、資産回転率が高い（例：2.5回）であれば、ROE = 5% × 2.5 × レバレッジで十分な収益性を確保できます。これは小売業、卸売業、飲食業などの薄利多売型ビジネスの特徴です。一方、利益率が高い企業（例：20%）は医薬品、ソフトウェアなど高付加価値ビジネスの特徴です。両者は異なるビジネスモデルであり、どちらが優れているわけではなく、業界特性に応じた評価が必要です。"},{"question":"自己資本比率が20%と低い企業と50%の企業について、どのような判断が適切ですか？","options":["自己資本比率20%の企業は財務リスクが高く、金利上昇や業績悪化時に経営難に陥る可能性があり、信用力評価は低い","自己資本比率20%の企業でも、高い収益力があれば問題ない","自己資本比率は企業評価で最も重要な指標であり、20%は絶対に避けるべき","自己資本比率と安全性の関係は業界で異なるため、比較できない"],"answer":0,"explanation":"【解法】自己資本比率20%は、企業の資産の80%が負債（他人資本）で調達されていることを意味します。このような企業は：①金利上昇時の利息負担増加リスク、②業績悪化時の借入返済困難なリスク、③追加借入が困難になるリスク、を抱えています。ただし、金融業など業界特性によって適正水準は異なります。一般事業会社では30%以上、できれば50%以上が望ましいとされています。自己資本比率と収益性を両立させることが企業経営の課題です。"},{"question":"CCC（キャッシュ・コンバージョン・サイクル）が長い企業の経営課題として最も適切なものはどれですか？","options":["仕入から販売代金回収までに長期間かかるため、その間、多額の運転資本が必要。売上成長に伴い資金繰りが逼迫する可能性がある","CCC が長いほど、企業の信用力が高く、優秀な経営をしている証拠である","CCC は財務指標分析では重要でなく、ROE や自己資本比率のみを重視すべき","CCC が長いことは、顧客に対する信用供与期間が長く、営業力が強いことを示す"],"answer":0,"explanation":"【解法】CCC は仕入から販売代金回収までに資金が拘束される日数です。例えば CCC が 100 日であれば、その間、売上高の約 100/365 相当の資金が運転資本として必要です。CCC が長い企業は：①多額の運転資本が必要、②売上成長時に資金逼迫リスク、③キャッシュフロー悪化リスク、を抱えています。売上債権回転期間の短縮（回収促進）、棚卸資産回転期間の短縮（在庫削減）、仕入債務回転期間の延長（支払延期）により CCC を短縮することが、運転資本効率化の重要な施策です。"},{"question":"2社を比較分析する際、A社（ROE8%、自己資本比率30%、D/Eレシオ2.3倍）と B 社（ROE8%、自己資本比率55%、D/Eレシオ0.8倍）で同じ ROE ですが、どのような評価の違いが生じますか？","options":["ROE が同じでも、A 社はレバレッジで稼ぎ金融リスクが高く、B 社は安定性重視で財務体質が強い。景気悪化時の耐性は B 社が優れている","ROE が同じなら、両社の価値評価は同じであり、特に違いはない","A 社の方が積極的な経営をしており、より優秀である","D/E レシオは重要でないため、ROE だけで評価すべき"],"answer":0,"explanation":"【解法】ROE が同じ 8% でも、その源泉（デュポン分析）が異なります。A 社は自己資本比率が低く（高レバレッジ）、限られた自己資本で 8% の ROE を確保している一方、B 社は安定した財務構造で 8% を実現しています。A 社は：①金利上昇時に利息負担が増加、②業績悪化時に借入返済が困難、③追加借入が難しい、というリスクを抱えています。B 社は追加投資や配当の余力があり、景気悪化時の耐性も高いです。同じ ROE でも、持続可能性と安全性の観点から B 社が優れていると評価されます。"},{"question":"流動比率 150%、当座比率 80%の企業について、最も正確な分析はどれですか？","options":["流動比率は最低ライン（100%）を超えているが理想には及ばない。当座比率 80%が 100%を下回っているため、棚卸資産に依存した流動性構造で、在庫リスクに注意が必要","流動比率 150%なので、短期支払能力は全く問題ない","当座比率が流動比率より低いのは計算ミスであり、正常ではない","流動比率と当座比率の差は経営上の問題ではなく、単なる会計上の区分の違い"],"answer":0,"explanation":"【解法】流動比率と当座比率の差異は、棚卸資産と前払費用の規模を示します。流動比率 150% - 当座比率 80% = 70% ポイントは、棚卸資産が流動資産の大部分を占めていることを意味します。つまり、この企業は：①棚卸資産が現金化されることに依存、②在庫が滞留すれば支払困難、③棚卸資産の陳腐化リスク、を抱えています。理想は当座比率 100%以上で、棚卸資産なしで短期支払能力を確保することです。特に小売業や製造業では、このような分析が重要です。"},{"question":"同業他社 5 社の平均 PER が 15 倍の場合、A 社の PER が 12 倍で株価が割安に見えます。しかし、A 社の ROE は 6%、業界平均は 10% です。この状況についての最も適切な説明はどれですか？","options":["A 社の ROE が低いため、将来の利益成長期待が低く、PER が低い（割安ではなく、利益力の低さを反映）。ROE 改善なき限り株価上昇は期待しにくい","PER が低いので、A 社は割安で買い時である","ROE と PER は独立していたため、関連性がない","PER のみで判断すべきで、ROE は参考値に過ぎない"],"answer":0,"explanation":"【解法】理論的には PBR = ROE × PER という関係が成り立ちます。A 社：ROE 6% × PER 12 倍 = PBR 0.72 倍、業界平均：ROE 10% × PER 15 倍 = PBR 1.5 倍という具合です。A 社の PER が低い理由は、ROE が低く、将来の利益成長期待が業界平均より低いためです。つまり、割安ではなく、利益力の低さを反映した低い評価です。A 社が投資対象として魅力的であるには、ROE の改善（営業利益率向上またはアセット・ターンオーバー改善）が必須です。"},{"question":"売上成長率が年 15% の高成長企業ですが、営業 CF が営業利益の 50% 程度に留まっています。この状況の最も可能性の高い原因はどれですか？","options":["急速な売上成長に伴い、運転資本（売上債権と棚卸資産）が急増しており、その資金が営業 CF としてマイナス調整されているため","企業の経営管理が悪く、利益計算が誤っている","営業 CF の計算方法に誤りがある","営業利益と営業 CF に違いが生じることはあり得ない"],"answer":0,"explanation":"【解法】高成長企業では、売上成長に伴い運転資本が急増します。例えば、売上が 15% 成長すれば、売上債権（売掛金）も棚卸資産も同程度増加する傾向があります。この運転資本の増加は営業 CF 計算で減額調整されるため、営業利益が 100 億円でも営業 CF が 50 億円程度に圧縮されます。つまり、利益は出ているが、資金繰りが厳しくなる「黒字だが現金不足」の状況です。この企業は、売上成長を支えるための追加資金調達（増資または借入）が必要になります。運転資本管理と資金計画の重要性が高い企業です。"}],"calculations":[{"question":"企業 A のデータ：売上高 2,000 億円、営業利益 200 億円、当期純利益 100 億円、総資産 1,600 億円、自己資本 800 億円、有利子負債 400 億円の場合、ROE、ROA、デュポン分析（利益率・回転率・レバレッジ）をすべて計算してください。","hint":"ROE = 利益率 × 回転率 × レバレッジの関係を使用。各要素を段階的に計算します。","answer":"ROE = 12.5%、ROA = 6.25%、利益率 = 5%、回転率 = 1.25 回、レバレッジ = 2.0 倍","steps":["Step1: ROE = 当期純利益 ÷ 自己資本 = 100 ÷ 800 = 12.5%","Step2: ROA = 当期純利益 ÷ 総資産 = 100 ÷ 1,600 = 6.25%","Step3: 売上高純利益率 = 当期純利益 ÷ 売上高 = 100 ÷ 2,000 = 5%","Step4: 総資産回転率 = 売上高 ÷ 総資産 = 2,000 ÷ 1,600 = 1.25 回","Step5: 財務レバレッジ = 総資産 ÷ 自己資本 = 1,600 ÷ 800 = 2.0 倍","Step6: デュポン分析検証 = 5% × 1.25 × 2.0 = 12.5% ✓"],"explanation":"デュポン分析により、ROE 12.5% が利益率 5%（やや低め）と回転率 1.25 回（標準的）とレバレッジ 2.0 倍（標準的）の組み合わせで実現していることが分かります。利益率向上が ROE 改善の最大の機会です。"},{"question":"企業 B のデータ：売上高 1,200 億円、売上原価 800 億円、売上債権 240 億円、棚卸資産 120 億円、仕入債務 80 億円、実効税率 30% の場合、売上債権回転期間、棚卸資産回転期間、仕入債務回転期間、CCC を計算してください。","hint":"回転期間 = 勘定科目 ÷ (年額÷365) という式を使用。","answer":"売上債権回転期間 = 73 日、棚卸資産回転期間 = 55 日、仕入債務回転期間 = 37 日、CCC = 91 日","steps":["Step1: 売上債権回転期間 = 売上債権 ÷ (売上高÷365) = 240 ÷ (1,200÷365) = 240 ÷ 3.29 ≒ 73 日","Step2: 棚卸資産回転期間 = 棚卸資産 ÷ (売上原価÷365) = 120 ÷ (800÷365) = 120 ÷ 2.19 ≒ 55 日","Step3: 仕入債務回転期間 = 仕入債務 ÷ (売上原価÷365) = 80 ÷ (800÷365) = 80 ÷ 2.19 ≒ 37 日","Step4: CCC = 売上債権回転期間 + 棚卸資産回転期間 − 仕入債務回転期間 = 73 + 55 − 37 = 91 日"],"explanation":"CCC 91 日は、仕入から販売代金回収まで 3 ヶ月程度かかることを示します。年間売上 1,200 億円の場合、約 300 億円の運転資本が必要です。売上債権回転期間の短縮や仕入債務回転期間の延長により CCC を削減することが経営課題です。"},{"question":"企業 C のデータ：自己資本 500 億円、有利子負債 300 億円、総資産 800 億円、流動資産 400 億円、流動負債 250 億円、現金 100 億円、売掛金 150 億円、棚卸資産 150 億円の場合、自己資本比率、D/Eレシオ、流動比率、当座比率をすべて計算してください。","hint":"当座資産 = 現金 + 売掛金 + 有価証券（この問題では現金と売掛金のみ）","answer":"自己資本比率 = 62.5%、D/Eレシオ = 0.6 倍、流動比率 = 160%、当座比率 = 100%","steps":["Step1: 自己資本比率 = 自己資本 ÷ 総資産 × 100% = 500 ÷ 800 × 100% = 62.5%","Step2: D/Eレシオ = 有利子負債 ÷ 自己資本 = 300 ÷ 500 = 0.6 倍","Step3: 流動比率 = 流動資産 ÷ 流動負債 × 100% = 400 ÷ 250 × 100% = 160%","Step4: 当座資産 = 現金 + 売掛金 = 100 + 150 = 250 億円","Step5: 当座比率 = 当座資産 ÷ 流動負債 × 100% = 250 ÷ 250 × 100% = 100%"],"explanation":"自己資本比率 62.5%、D/Eレシオ 0.6 倍と、企業 C の財務安定性は非常に高い水準です。流動比率 160% と当座比率 100% も、理想的な短期支払能力を示しています。優良企業の財務指標です。"}],"caseStudy":{"title":"急成長ベンチャー企業の財務分析","scenario":"売上成長率 30% の SaaS ベンチャー企業 Y 社を分析しています。ROE は 8%（自己資本 50 億円）で見た目は標準的ですが、デュポン分析すると利益率 10%（売上 50 億円で利益 5 億円）、総資産回転率 1.0 倍、レバレッジ 0.8 倍（負債が少ない）となっています。また、営業 CF が当期純利益の 40% 程度に留まっています。","questions":["Y 社の財務指標から、その経営段階と課題は何か分析してください。","売上成長にもかかわらず営業 CF が利益の 40% に留まる理由は何か、そして対応策は何か提案してください。"],"modelAnswer":"【経営段階の分析】Y 社は高成長ベンチャー企業の典型的なパターンを示しています。\n\n【デュポン分析の解釈】\n・利益率 10%：SaaS 業界としては標準的（ただし、成長投資中のため改善余地あり）\n・総資産回転率 1.0 倍：低い（固定資産投資が多い可能性。システム開発費など無形資産）\n・レバレッジ 0.8 倍：保守的（成長資金調達の余地がある）\n\n【営業 CF が利益 40% に留まる理由】\n1. 売上成長 30% に伴う運転資本の急増：売掛金と前払費用が増加\n2. システム開発費などの資本化処理：P/L では減価償却費として計上されるが、投資段階で実際の現金支出\n3. 売上債権の増加：サブスクリプション型ビジネスの月次請求遅延\n\n【課題と戦略】\n1. 資金計画の策定：売上成長に伴う運転資本と設備投資に必要な資金を明確化\n2. 資金調達：保守的なレバレッジ（0.8 倍）を活用して、成長投資を加速\n3. 運転資本管理：売上債権の回収促進、サブスク契約の前払い促進\n4. ROE 向上：成長段階から成熟段階への移行期に、利益率と回転率の両立を目指す\n\n【推奨】Y 社は高い成長性を持つ企業であり、むしろ積極的な資本調達（増資または借入）により、成長投資を加速すべき段階です。"}},{"id":3,"title":"企業価値評価の概念","subtitle":"EV・株式価値・マルチプル法","phase":1,"content":"<h3>第1章 企業価値の基本概念</h3>\n<h4>企業価値（EV）とは</h4>\n<p>企業価値（Enterprise Value：EV）とは、企業全体の経済的価値を指します。「誰にとっての価値か」を意識することが重要です。</p>\n<h4>ステークホルダー別の価値</h4>\n<table border=\"1\" cellpadding=\"10\">\n<tr><th>ステークホルダー</th><th>帰属する価値</th><th>内容</th></tr>\n<tr><td>株主</td><td>株式価値</td><td>配当と株価上昇の期待</td></tr>\n<tr><td>債権者</td><td>負債価値</td><td>元本と利息の返済</td></tr>\n<tr><td>株主＋債権者</td><td>企業価値（EV）</td><td>企業全体の価値</td></tr>\n</table>\n<h4>企業価値の階層構造</h4>\n<p><strong>企業価値（EV）= 事業価値 + 非事業用資産</strong></p>\n<p><strong>株式価値 = 企業価値（EV） − 純有利子負債</strong></p>\n<h3>第2章 マルチプル法（類似会社比較法）</h3>\n<h4>マルチプル法の概要</h4>\n<p>マルチプル法とは、類似する上場企業の株価と財務指標の倍率（マルチプル）を用いて、対象企業の価値を算定する手法です。相対評価法とも呼ばれます。</p>\n<h4>株式価値マルチプル</h4>\n<table border=\"1\" cellpadding=\"10\">\n<tr><th>指標</th><th>計算式</th><th>特徴・用途</th></tr>\n<tr><td>PER</td><td>時価総額 ÷ 当期純利益</td><td>最も一般的。投資回収年数の目安</td></tr>\n<tr><td>PBR</td><td>時価総額 ÷ 純資産</td><td>解散価値との比較</td></tr>\n<tr><td>PSR</td><td>時価総額 ÷ 売上高</td><td>赤字企業の評価</td></tr>\n</table>\n<h4>企業価値マルチプル</h4>\n<table border=\"1\" cellpadding=\"10\">\n<tr><th>指標</th><th>計算式</th><th>特徴・用途</th></tr>\n<tr><td>EV/EBITDA</td><td>EV ÷ EBITDA</td><td>M&A で最も多用。資本構成の影響を排除</td></tr>\n<tr><td>EV/EBIT</td><td>EV ÷ 営業利益</td><td>減価償却を考慮</td></tr>\n<tr><td>EV/売上高</td><td>EV ÷ 売上高</td><td>赤字企業の評価</td></tr>\n</table>\n<h4>EV/EBITDA が M&A で多用される理由</h4>\n<ul>\n<li>資本構成（D/E 比率）の影響を排除できる</li>\n<li>減価償却方法の違いの影響を軽減できる</li>\n<li>税率の違いの影響を排除できる</li>\n<li>EBITDA はキャッシュフロー創出力の簡易指標</li>\n</ul>\n<h3>第3章 類似会社の選定</h3>\n<h4>類似会社選定の基準</h4>\n<table border=\"1\" cellpadding=\"10\">\n<tr><th>基準</th><th>詳細と確認ポイント</th></tr>\n<tr><td>事業内容</td><td>同じ製品・サービス、顧客層、ビジネスモデル</td></tr>\n<tr><td>事業規模</td><td>売上高、総資産、時価総額。規模差が10倍以上は慎重</td></tr>\n<tr><td>成長性</td><td>成長ステージ（創業期/成長期/成熟期）の一致</td></tr>\n<tr><td>収益性</td><td>利益率、ROE の同程度</td></tr>\n<tr><td>地理的要因</td><td>主要市場、規制環境の相同性</td></tr>\n</table>","keyPoints":["企業価値（EV）は株主と債権者に帰属する企業全体の価値。株式価値はEVから有利子負債を控除した株主帰属分","EV = 時価総額 + 純有利子負債 という基本公式を理解することが重要","マルチプル法は相対評価。類似会社の選定精度がそのまま評価精度に影響する","EV/EBITDA が M&A で最も多用される理由は、資本構成と税率の影響を排除できるから","業種別 EV/EBITDA：ソフトウェア 12-20 倍、製薬 10-15 倍、製造業 6-9 倍という目安がある"],"quizzes":[{"question":"企業価値（EV）と株式価値の違いについて、最も正確な説明はどれですか？","options":["EV は株主と債権者両方に帰属する企業全体の価値であり、株式価値は EV から有利子負債を控除した株主のみに帰属する価値","EV と株式価値は同じ意味であり、区別する必要はない","株式価値は常に EV より高い","EV は理論上の価値で、株式価値のみが実際の価値"],"answer":0,"explanation":"【解法】企業の価値を考える際、重要なのは「誰にとっての価値か」です。EV（企業全体の価値）は、その企業から生み出されるキャッシュフローに対する請求権を、株主と債権者がそれぞれ保有しています。M&A では買い手が EV（企業全体）を取得しますが、その対価は株式価値（EV−有利子負債）で評価します。つまり、取得した EV から既存負債を返済することで、株主帰属の純価値が決まるということです。この概念の正確な理解が、M&A 価格交渉の基本です。"},{"question":"マルチプル法で PER ではなく EV/EBITDA を使用する理由として、最も重要なものはどれですか？","options":["EV/EBITDA は資本構成（負債比率）と税率の影響を排除できるため、異なる資本構成や税率の企業間で公正に比較でき、M&A に適している","EV/EBITDA の方が計算が簡単である","PER は上場企業にのみ適用でき、非上場企業には EV/EBITDA を使う","EV/EBITDA は常に PER より正確である"],"answer":0,"explanation":"【解法】PER（= 時価総額 ÷ 当期純利益）は、支払利息（負債コスト）と法人税の影響を含んでおり、資本構成の異なる企業では比較が歪みやすいです。一方、EV/EBITDA（= EV ÷（営業利益 + 減価償却費））は、支払利息や税金を控除する前の営業キャッシュフロー創出力をベースにしているため、資本構成や税率の違いを排除できます。M&A では買い手が企業全体（EV）の価値を評価する際に、このような歪みを排除することが重要です。"},{"question":"類似会社比較法で、売上高 100 億円の企業 A と売上高 1,000 億円の企業 B の EV/EBITDA マルチプルが同じ 8 倍だった場合、企業 A を評価する際にどのような調整を検討すべきですか？","options":["規模差が 10 倍に近いため、企業 A には流動性ディスカウント（10-30%）を適用して評価額を調整すべき。また、企業 B の成長率や収益性が異なれば、その差をマルチプルに反映させる","マルチプルが同じなら規模に関わらず同じ評価をすべき","規模が小さい企業 A の方がリスクが低いため、プレミアムを加算すべき","規模の違いは評価に無関係であり、調整は不要"],"answer":0,"explanation":"【解法】類似会社比較法では「類似」の判断が重要です。売上規模が 10 倍異なる場合、以下の調整を検討します。①流動性ディスカウント：企業 A は規模が小さく、市場で売却する際の流動性が低いため 10-30% のディスカウント。②成長性の違い：企業 B が高成長で企業 A が低成長なら、マルチプル差を反映。③経営の質：大企業と中小企業では経営体制が異なる可能性。このような調整を通じて、より適切な評価を導出します。"},{"question":"非上場企業を EV/EBITDA マルチプルで評価する場合、上場企業のマルチプル適用時に検討すべき調整はどれですか？","options":["非流動性ディスカウント（10-30%）：市場で売却できないリスク、コントロールプレミアム（20-40%）：支配権取得時の上乗せ、を検討する必要がある","非上場企業には上場企業と同じマルチプルを適用すべき","非上場企業は上場企業より価値が低いため、常に 50% ディスカウントを適用","マルチプルは企業の事業内容だけで決まり、上場/非上場は無関係"],"answer":0,"explanation":"【解法】非上場企業評価の際、上場企業マルチプルからの調整項目は：①非流動性ディスカウント：株式市場で売却できない（流動性なし）というリスク。②マイノリティディスカウント：少数株主持分の評価時。③コントロールプレミアム：支配権取得時（M&A 時）の上乗せ。これらは文脈によって加減が変わります。例えば、M&A で支配権取得する場合、コントロールプレミアムは加算（20-40%）される一方、少数株主持分を評価する場合、マイノリティディスカウント（15-25%）が適用されます。"},{"question":"業種別 EV/EBITDA の目安がソフトウェア 12-20 倍、製造業 6-9 倍で異なる理由として、最も適切な説明はどれですか？","options":["成長期待と事業の安定性の違い。ソフトウェアは高成長期待とスケーラビリティのため高マルチプル。製造業は低成長・安定で低マルチプル","ソフトウェア企業の経営が優秀で製造業が劣るため","マルチプルは会計基準の違いだけで決まる","業種による違いは認識されておらず、すべての業種で同一マルチプルを使用すべき"],"answer":0,"explanation":"【解法】マルチプルは企業の成長性、安定性、リスクプロファイルを反映します。ソフトウェア産業は：①高成長期待（年 20-30%）、②スケーラビリティが高い（追加投資少で売上増加）、③キャッシュフロー安定性、により 12-20 倍の高マルチプル。製造業は：①低成長期待（年 5-10%）、②資本集約的（大型投資が必要）、③景気敏感性、により 6-9 倍の低マルチプル。このマルチプル差は市場の将来期待を反映しており、正当な評価構造です。"},{"question":"M&A 初期段階で複数のマルチプル（PER、EV/EBITDA、EV/売上高）で対象企業を評価する理由として、最も重要なものはどれですか？","options":["複数の視点で評価レンジを示すことで、単一指標の偏りを排除し、買収価格の交渉レンジを定量的に把握できる。また、指標間の乖離から対象企業の特性を分析できる","複数の指標を使用すれば、より正確な価値が得られる","法的に複数のマルチプル使用が義務づけられている","1 つのマルチプルで十分であり、複数使用は不必要"],"answer":0,"explanation":"【解法】M&A 初期段階では、対象企業の特性を把握しながら、買収価格の概算レンジを示すことが重要です。複数マルチプルの活用により：①評価の幅：PER で評価した額と EV/EBITDA で評価した額に乖離がある場合、その原因（利益率の違い、資本構成の違い）を分析できます。②特性の把握：例えば EV/売上高が高い場合、高利益率企業であることを示唆。③交渉基準の設定：「複数指標での評価平均は 700-800 億円」という形で交渉スタート地点を定める。このプロセスは理論的かつ実務的に正当化できます。"}],"calculations":[{"question":"企業 D のデータ：時価総額 1,500 億円、有利子負債 600 億円、現金 200 億円、投資有価証券 100 億円の場合、純有利子負債と EV を計算してください。","hint":"純有利子負債 = 有利子負債 − 現金です。EV = 時価総額 + 純有利子負債。","answer":"純有利子負債 = 400 億円、EV = 1,900 億円","steps":["Step1: 純有利子負債 = 有利子負債 − 現金 = 600 − 200 = 400 億円","Step2: EV = 時価総額 + 純有利子負債 = 1,500 + 400 = 1,900 億円","Step3: 注：投資有価証券は非事業用資産であり、EV 計算には含めない（事業価値評価時に別途減算）"],"explanation":"EV 計算では現金を控除することが重要です。買い手は、買収対価（時価総額）で株式を取得すると同時に、現金を取得でき、有利子負債を引き継ぎます。したがって、実質的なコストは時価総額＋有利子負債−現金です。"},{"question":"企業 E のデータ：EV 2,000 億円、EBITDA 250 億円、営業利益 200 億円、当期純利益 100 億円、発行済株式数 1,000 万株、株価 2,000 円の場合、EV/EBITDA、EV/EBIT、PER をすべて計算してください。","hint":"時価総額 = 株価 × 発行済株式数です。","answer":"EV/EBITDA = 8.0 倍、EV/EBIT = 10.0 倍、PER = 20.0 倍","steps":["Step1: 時価総額 = 2,000 円 × 1,000 万株 = 2,000 億円","Step2: EV/EBITDA = EV ÷ EBITDA = 2,000 ÷ 250 = 8.0 倍","Step3: EV/EBIT = EV ÷ 営業利益 = 2,000 ÷ 200 = 10.0 倍","Step4: PER = 時価総額 ÷ 当期純利益 = 2,000 ÷ 100 = 20.0 倍"],"explanation":"3 つのマルチプル（8.0 倍、10.0 倍、20.0 倍）の乖離から、企業 E の特性が分かります。EV/EBIT と PER の差（10 倍 vs 20 倍）が大きい理由は、支払利息と法人税の影響です。営業利益 200 億円から支払利息と税金を控除すると当期純利益 100 億円となり、この差分が 2 倍のマルチプル差を生みます。"},{"question":"類似上場企業の平均 EV/EBITDA が 9 倍の場合、企業 F（EBITDA 80 億円、有利子負債 150 億円、現金 30 億円）の株式価値を計算してください。","hint":"Step1 で EV を計算し、Step2 で純有利子負債を計算、Step3 で株式価値を求めます。","answer":"株式価値 = 580 億円","steps":["Step1: EV = EBITDA × EV/EBITDA倍率 = 80 × 9 = 720 億円","Step2: 純有利子負債 = 有利子負債 − 現金 = 150 − 30 = 120 億円","Step3: 株式価値 = EV − 純有利子負債 = 720 − 120 = 600 億円"],"explanation":"マルチプル法での株式価値算定の標準プロセスです。EV を算出した後、純有利子負債を控除することで株主帰属の価値（株式価値）を求めます。この例では買収価格の交渉基準になる数値です。"}],"caseStudy":{"title":"医療機器メーカーの企業価値評価","scenario":"医療機器大手 Z 社（売上高 800 億円、EBITDA 120 億円、営業利益 100 億円、当期純利益 60 億円）の M&A 案件が浮上しました。類似上場企業（大手医療機器メーカー 3 社）の平均マルチプル：PER 18 倍、EV/EBITDA 10 倍。一方、Z 社は成長率 8% で業界平均（12%）より低く、営業利益率 12.5% で業界平均（14%）より低いです。","questions":["Z 社の PER とマルチプル法の評価結果から、類似企業マルチプルをそのまま適用すべきか判断し、調整理由を説明してください。","複数マルチプル（PER、EV/EBITDA）で Z 社を評価した場合、その差異から何が読み取れるか分析してください。"],"modelAnswer":"【評価分析】\n\n【Step1：マルチプル法による評価】\n・EV/EBITDA 法：EV = 120 × 10 = 1,200 億円\n  時価総額 = 1,200 − (有利子負債 − 現金) で算定\n・PER 法：時価総額 = 60 × 18 = 1,080 億円\n\n【マルチプル適用の判断】\nZ 社が類似企業より低成長（8% vs 12%）で低収益性（12.5% vs 14%）のため、そのまま業界平均マルチプルを適用することは慎重に検討すべき。\n\n【調整要因】\n・成長率の割引：8% 成長企業に 10 倍マルチプルは割高の可能性。8-9 倍への調整を検討\n・収益性の割引：営業利益率 1.5%ポイント低いため、マルチプル 0.5-1.0 倍引き下げを検討\n・調整後マルチプル：EV/EBITDA を 9 倍に調整 → EV = 1,080 億円\n\n【複数マルチプルの乖離分析】\n・EV/EBITDA 10 倍で評価すると EV 1,200 億円（株式価値 ~1,100 億円）\n・PER 18 倍で評価すると時価総額 1,080 億円\n・差異（120 億円）の原因：支払利息と法人税の影響\n  - EBITDA 120 → 営業利益 100（減価償却費 20 億円）\n  - 営業利益 100 → 当期純利益 60（支払利息と税金で 40 億円の減少）\n\n【買収価格の推奨レンジ】\n・マルチプル調整後の評価：1,000-1,100 億円\n・成長性と収益性の改善期待を加味した上乗せ：50-100 億円\n・推奨レンジ：1,050-1,200 億円（ベース評価の ±10%）\n\n【重要な視点】\nZ 社は低成長・低収益だが、買い手のシナジー効果（営業費用削減、販売拡大）で改善可能性があれば、プレミアムを加算する余地があります。"}},{"id":4,"title":"資本コスト","subtitle":"CAPM・β・WACC","phase":1,"content":"<h3>第1章 資本コストの基本概念</h3>\n<p>資本コスト（Cost of Capital）とは、企業が資金を調達するためのコストであり、投資家の視点からは期待収益率です。この二面性を理解することが重要です。</p>\n\n<table>\n<tr><th>視点</th><th>資本コストの意味</th></tr>\n<tr><td>企業側</td><td>資金調達のためのコスト。これを上回るリターンを生む投資が必要</td></tr>\n<tr><td>投資家側</td><td>期待収益率。リスクに見合ったリターンを要求</td></tr>\n</table>\n\n<h4>資本コストの重要性</h4>\n<ul>\n<li><strong>投資判断の基準：</strong>NPV法やIRR法において、投資案件の採否を判断するハードルレート</li>\n<li><strong>企業価値評価：</strong>DCF法における将来キャッシュフローの割引率</li>\n<li><strong>資本構成の決定：</strong>最適な負債と株主資本の比率を決定する際の基準</li>\n<li><strong>業績評価：</strong>EVA（経済的付加価値）計算における資本チャージの基礎</li>\n</ul>\n\n<h4>株主資本コストと負債コスト</h4>\n<p>企業の資本調達源泉は、株主資本（エクイティ）と負債（デット）に分かれます。</p>\n\n<table>\n<tr><th>資本の種類</th><th>コストの性質</th><th>水準の目安</th></tr>\n<tr><td>株主資本</td><td>暗黙のコスト。配当＋株価上昇期待</td><td>6〜10%程度</td></tr>\n<tr><td>負債</td><td>明示的コスト。契約金利</td><td>1〜4%程度（税引後）</td></tr>\n</table>\n\n<h3>第2章 CAPM（資本資産価格モデル）</h3>\n<p>CAPM（Capital Asset Pricing Model：資本資産価格モデル）は、株主資本コストを算出するための理論モデルです。1960年代にウィリアム・シャープらによって開発されました。</p>\n\n<h4>CAPM計算式</h4>\n<p><strong>株主資本コスト(Re) = Rf + β × (Rm − Rf)</strong></p>\n<ul>\n<li><strong>Rf：</strong>リスクフリーレート（通常、国債利回り）</li>\n<li><strong>β：</strong>ベータ（市場感応度）</li>\n<li><strong>Rm − Rf：</strong>マーケットリスクプレミアム（MRP）</li>\n</ul>\n\n<h4>リスクフリーレート（Rf）</h4>\n<p>リスクフリーレートは、リスクなしで得られるリターンの水準です。通常、国債利回りを使用します。</p>\n\n<table>\n<tr><th>対象国</th><th>参照する金利</th><th>現在の水準（目安）</th></tr>\n<tr><td>日本</td><td>10年国債利回り</td><td>0.5〜1.5%</td></tr>\n<tr><td>米国</td><td>10年米国債利回り</td><td>4〜5%</td></tr>\n</table>\n\n<h4>ベータ（β）</h4>\n<p>ベータは、個別株式のリスク（価格変動）を市場全体のリスクと比較した指標です。市場感応度とも呼ばれます。</p>\n<p><strong>β = 個別株式のリターンと市場リターンの共分散 ÷ 市場リターンの分散</strong></p>\n\n<table>\n<tr><th>β値</th><th>解釈</th></tr>\n<tr><td>β = 1.0</td><td>市場平均と同じリスク。市場が10%上昇すれば、この株式も10%上昇する傾向</td></tr>\n<tr><td>β > 1.0</td><td>市場より高リスク。市場変動を増幅。景気敏感株、レバレッジの高い企業</td></tr>\n<tr><td>β < 1.0</td><td>市場より低リスク。市場変動を緩和。ディフェンシブ株、公益事業</td></tr>\n</table>\n\n<h4>業種別βの目安</h4>\n<table>\n<tr><th>業種</th><th>β目安</th><th>特徴</th></tr>\n<tr><td>電力・ガス（公益）</td><td>0.3〜0.6</td><td>安定需要</td></tr>\n<tr><td>食品・飲料</td><td>0.5〜0.8</td><td>景気非感応</td></tr>\n<tr><td>製薬・ヘルスケア</td><td>0.6〜0.9</td><td>安定需要</td></tr>\n<tr><td>小売・消費財</td><td>0.8〜1.1</td><td>景気やや感応</td></tr>\n<tr><td>製造業（一般）</td><td>1.0〜1.3</td><td>景気感応</td></tr>\n<tr><td>金融</td><td>1.1〜1.5</td><td>レバレッジ高</td></tr>\n<tr><td>半導体・ハイテク</td><td>1.3〜1.8</td><td>景気敏感、成長期待</td></tr>\n</table>\n\n<h4>マーケットリスクプレミアム（Rm − Rf）</h4>\n<p>マーケットリスクプレミアム（MRP）は、株式市場全体への投資に対して、無リスク資産を上回って要求されるリターンです。一般的に5〜7%程度が使用されます。</p>\n\n<h3>第3章 WACC（加重平均資本コスト）</h3>\n<p>WACC（Weighted Average Cost of Capital：加重平均資本コスト）は、株主資本コストと負債コストを、それぞれの調達比率で加重平均した企業全体の資本コストです。</p>\n\n<h4>WACC計算式</h4>\n<p><strong>WACC = Re × E/(D+E) + Rd × (1−T) × D/(D+E)</strong></p>\n<ul>\n<li><strong>Re：</strong>株主資本コスト（CAPMで算出）</li>\n<li><strong>Rd：</strong>負債コスト（税引前）</li>\n<li><strong>T：</strong>実効税率</li>\n<li><strong>E：</strong>株主資本の時価（時価総額）</li>\n<li><strong>D：</strong>有利子負債の時価（通常は簿価で近似）</li>\n</ul>\n\n<h4>タックスシールド効果</h4>\n<p>負債の利息支払いは、税務上の損金として認められるため、法人税の軽減効果が生じます。</p>\n<p><strong>税引後負債コスト = Rd × (1 − T)</strong></p>\n\n<h4>WACC計算例</h4>\n<p><strong>前提条件：</strong></p>\n<ul>\n<li>株主資本コスト（Re）：8%</li>\n<li>負債コスト（税引前Rd）：3%</li>\n<li>実効税率（T）：30%</li>\n<li>時価総額（E）：700億円</li>\n<li>有利子負債（D）：300億円</li>\n</ul>\n\n<p><strong>Step 1：資本構成比率</strong></p>\n<ul>\n<li>E/(D+E) = 700億円 ÷ 1,000億円 = 70%</li>\n<li>D/(D+E) = 300億円 ÷ 1,000億円 = 30%</li>\n</ul>\n\n<p><strong>Step 2：税引後負債コスト</strong></p>\n<ul>\n<li>Rd × (1−T) = 3% × (1 − 30%) = 2.1%</li>\n</ul>\n\n<p><strong>Step 3：WACC</strong></p>\n<ul>\n<li>WACC = 8% × 70% + 2.1% × 30%</li>\n<li>WACC = 5.6% + 0.63% = 6.23%</li>\n</ul>\n\n<h4>WACCを下げる方法</h4>\n<table>\n<tr><th>方法</th><th>内容とリスク</th></tr>\n<tr><td>負債比率の増加</td><td>負債コストは株主資本コストより低いため、WACC低下。ただし財務リスク増</td></tr>\n<tr><td>事業リスクの低減</td><td>βの低下により株主資本コストが低下。安定収益事業へのシフト</td></tr>\n<tr><td>信用力の向上</td><td>格付け改善により負債コストが低下。財務体質の強化</td></tr>\n</table>","keyPoints":["資本コストは企業側では資金調達コスト、投資家側では期待収益率","CAPM公式：Re = Rf + β × (Rm − Rf)により株主資本コストを計算","βは市場感応度で、β>1は市場より高リスク、β<1は市場より低リスク","WACCは株主資本コストと負債コストの加重平均で企業全体の資本コスト","タックスシールド効果により税引後負債コストは税引前より低い","WACCを下げることで、より多くの投資案件が採算性を満たす"],"quizzes":[{"question":"リスクフリーレート1.5%、β=1.3、マーケットリスクプレミアム6%の場合、CAPMで算出される株主資本コストはいくらか？","options":["7.3%","8.28%","9.3%","10.5%"],"answer":2,"explanation":"【解法】CAPM公式を使用します。Re = Rf + β × (Rm − Rf) = 1.5% + 1.3 × 6% = 1.5% + 7.8% = 9.3%。β=1.3は市場平均より30%リスクが高いことを示し、その分だけ高いリターンが要求されます。"},{"question":"β値が2.0の企業とβ値が0.5の企業を比較した場合、正しいのはどれか？","options":["β=2.0の企業は市場平均の2倍の利益を確保する","β=0.5の企業はβ=2.0の企業より株主資本コストが低い","β値の差は企業の規模の差を示す","両者の株主資本コストの差は必ず1.5倍になる"],"answer":1,"explanation":"【解法】βは企業価値やサイズではなく、リスク（価格変動）を示すものです。β値が低い企業ほど市場変動の影響が小さく、株主資本コストが低くなります。例えば、Rf=1%、MRP=5%なら、β=0.5で4%、β=2.0で11%となり、β=0.5の方が低くなります。"},{"question":"株主資本コスト10%、負債コスト（税引前）4%、実効税率25%、時価総額500億円、有利子負債200億円の場合、WACCはいくらか？","options":["5.0%","7.0%","8.0%","9.5%"],"answer":2,"explanation":"【解法】Step 1：総資本 = 500 + 200 = 700億円。株主資本比率 = 500/700 = 71.4%、負債比率 = 200/700 = 28.6%。Step 2：税引後負債コスト = 4% × (1 − 25%) = 3%。Step 3：WACC = 10% × 71.4% + 3% × 28.6% = 7.14% + 0.86% = 8.0%。"},{"question":"食品会社（β=0.6）と自動車メーカー（β=1.4）のいずれが、より高い株主資本コストを要求されるか？","options":["食品会社の方がより高い","自動車メーカーの方がより高い","βが同じなら同じ","企業規模で決まり、βは関係ない"],"answer":1,"explanation":"【解法】自動車メーカーはβ=1.4で、食品会社のβ=0.6より高いため、より高いリスクを負っています。Rf=1%、MRP=5%の場合、食品会社：1% + 0.6×5% = 4%、自動車メーカー：1% + 1.4×5% = 8%となり、自動車メーカーが2倍のリターンを要求されます。"},{"question":"負債100、金利5%、実効税率30%のとき、タックスシールド効果により実質的な利息負担はいくらになるか？","options":["3.5","4.0","5.0","6.5"],"answer":0,"explanation":"【解法】支払利息 = 100 × 5% = 5。タックスシールド = 5 × 30% = 1.5。実質利息負担 = 5 − 1.5 = 3.5。または、税引後負債コスト = 5% × (1 − 30%) = 3.5%なので、実質負担 = 100 × 3.5% = 3.5。利息は税務上の損金となるため、法人税が軽減されます。"},{"question":"WACCを低下させるための方法のうち、最もリスクが高いのはどれか？","options":["事業リスク（β）を低減する","信用力を向上させて負債コストを低下させる","負債比率を増加させる","運転資本を効率化する"],"answer":2,"explanation":"【解法】負債比率を増加させることは、タックスシールドによりWACC低下につながりますが、同時に財務リスク（倒産リスク）が高まり、株主資本コストと負債コストが上昇するリスクがあります。過度な負債増加は企業の財務安定性を損なう危険があります。事業リスク低減や信用力向上は、より持続可能で低リスクのアプローチです。"},{"question":"レバードβとアンレバードβの関係を示す式はどれか？","options":["βL = βU × D/E","βL = βU × {1 + (1−T) × D/E}","βU = βL + (1−T) × D/E","βL = βU ÷ {1 + (1−T) × D/E}"],"answer":1,"explanation":"【解法】正しい関係式はβL = βU × {1 + (1−T) × D/E}です。βL（レバードβ）は観測されるβで、企業の負債が含まれています。βU（アンレバードβ）は事業リスクのみのβです。負債が多いほどβは高くなり、非上場企業の評価や異なる資本構成の企業比較では、この調整が必要になります。"}],"calculations":[{"question":"CAPM計算：リスクフリーレート2.0%、β=1.2、MRP=5.5%の企業の株主資本コストを計算してください","hint":"CAPM公式：Re = Rf + β × (Rm − Rf)を使用してください","answer":"8.6%","steps":["Step 1：β × MRPを計算します：1.2 × 5.5% = 6.6%","Step 2：Rfを加算します：2.0% + 6.6% = 8.6%","Step 3：結果の解釈：この企業の株主は8.6%のリターンを期待しており、市場平均より20%高いリスク（β=1.2）に見合った高いリターンが要求されます"],"explanation":"CAPMは、リスクフリーレート（安全な資産のリターン）にリスクプレミアム（βとMRPの積）を加算することで、個別企業に要求される株主資本コストを算出します。β値が大きいほど、市場変動の影響が大きく、より高いリターンが要求されます。"},{"question":"WACC計算：株主資本コスト9%、負債コスト（税引前）3.5%、実効税率28%、株主資本（時価）600億円、有利子負債（時価）400億円の場合のWACCを計算してください","hint":"Step 1で資本構成比率を計算し、Step 2で税引後負債コストを計算し、Step 3でWACCを計算します","answer":"6.8%","steps":["Step 1：総資本を計算します：600億円 + 400億円 = 1,000億円","Step 2：資本構成比率を計算します：E/(D+E) = 600/1,000 = 60%、D/(D+E) = 400/1,000 = 40%","Step 3：税引後負債コストを計算します：3.5% × (1 − 28%) = 3.5% × 0.72 = 2.52%","Step 4：WACCを計算します：9% × 60% + 2.52% × 40% = 5.4% + 1.008% = 6.408% ≈ 6.4%"],"explanation":"WACCは、株主資本コストと負債コストをそれぞれの時価ウェイトで加重平均したものです。負債のウェイトが高い場合、WACCは低下する傾向があります。また、負債コストは税引前ベースで3.5%ですが、利息が税務上の損金となるため、税引後では2.52%に低下します。この税効果を考慮することが重要です。"},{"question":"タックスシールド効果の計算：借入金150億円、金利4%、実効税率32%の場合、タックスシールド効果による年間の税金軽減額を計算してください","hint":"支払利息に実効税率を乗じることで、税金軽減額が計算されます","answer":"1.92億円","steps":["Step 1：支払利息を計算します：150億円 × 4% = 6億円","Step 2：タックスシールド（税金軽減額）を計算します：6億円 × 32% = 1.92億円","Step 3：実質的な利息負担を計算します：6億円 − 1.92億円 = 4.08億円","Step 4：別方法で検証：税引後負債コスト = 4% × (1 − 32%) = 2.72%、150億円 × 2.72% = 4.08億円（一致）"],"explanation":"タックスシールド効果は、負債の利息支払いが税務上の損金として認められるため、法人税が軽減される効果です。借り入れが大きいほど、また実効税率が高いほど、この効果は大きくなります。このため、負債を活用することで、企業全体の資本コスト（WACC）が低下する可能性があります。ただし、過度な負債は財務リスクを増加させるため注意が必要です。"}],"caseStudy":{"title":"Y社の資本コスト評価","scenario":"Y社は時価総額800億円、有利子負債300億円の製造業企業です。市場データは以下の通りです：Y社のβ=1.25、リスクフリーレート1.2%、マーケットリスクプレミアム5.5%、負債コスト（税引前）3.2%、実効税率30%。経営陣が新規プロジェクトの投資判断のためにWACCを必要としています。","questions":["CAPM公式を使用してY社の株主資本コストを計算してください。β値が1.25である理由を製造業の特性から説明してください。","Y社のWACCを計算してください。計算過程でそれぞれのステップを明確に示してください。","現在のWACCを下げるための3つの具体的な施策を提案してください。それぞれのメリットとリスクを説明してください。","Y社が有利子負債を300億円から450億円に増加させた場合、WACCにどのような影響が生じるか分析してください。"],"modelAnswer":"【Y社の資本コスト評価】\n\n1. 株主資本コスト（CAPM）の計算\nRe = Rf + β × (Rm − Rf)\nRe = 1.2% + 1.25 × 5.5%\nRe = 1.2% + 6.875%\nRe = 8.075% ≈ 8.08%\n\nβ=1.25の理由：製造業は景気循環の影響を受けやすく、固定費比率が高いため営業レバレッジが高い。市場平均（β=1.0）よりも25%高いリスクを負っています。\n\n2. WACC計算\nStep 1：総資本 = 800 + 300 = 1,100億円\n株主資本比率 = 800/1,100 = 72.7%\n負債比率 = 300/1,100 = 27.3%\n\nStep 2：税引後負債コスト\nRd(1−T) = 3.2% × (1 − 30%) = 3.2% × 0.7 = 2.24%\n\nStep 3：WACC\nWACC = 8.08% × 72.7% + 2.24% × 27.3%\nWACC = 5.87% + 0.61%\nWACC = 6.48%\n\nこの6.48%が、Y社の新規プロジェクトを評価するハードルレートとなります。プロジェクトのIRRがこれを上回る場合、企業価値を向上させる投資として判断されます。\n\n3. WACCを下げるための3つの施策\n\n【施策1：事業リスク（β）の低減】\nメリット：安定した事業ポートフォリオにより、株主資本コストが低下\n方法：高利益率で安定需要の事業への多角化\n実例：高級素材事業やヘルスケア関連への参入\nリスク：成長機会の放棄、新規事業参入に時間とコストが必要\n\n【施策2：信用力向上による負債コスト低減】\nメリット：格付け改善により借入金利が低下（例：3.2%→2.8%）\n方法：営業利益率向上、債務返済の加速\nリスク：信用力向上には時間が必要、ROI改善が不可欠\n\n【施策3：最適資本構成の達成】\nメリット：タックスシールド効果とリスク増加のバランスを最適化\n現在の負債比率27.3%を業界平均40%程度に段階的に引き上げ\nリスク：過度な負債は倒産リスク増加、格付け低下につながる可能性\n\n4. 負債増加シナリオの分析\n\n新シナリオ：有利子負債450億円、総資本1,250億円\n新しい資本構成：株主資本64%、負債比率36%\n\n想定される影響：\n・タックスシールド効果の増加：税引後負債コスト × 高い負債ウェイト\n・財務リスク増加：βが上昇（例：1.25→1.35程度）\n・株主資本コストが上昇する可能性\n\n新WACC（概算）\n仮に新β = 1.32とすると：\nRe = 1.2% + 1.32 × 5.5% = 8.46%\nWACC = 8.46% × 64% + 2.24% × 36% = 6.58%\n\n現在のWACC 6.48%と比べて、わずかに上昇する可能性があります。\nこれは、タックスシールド効果（負債ウェイト増加による低下圧力）と\nリスク増加（β上昇による株主資本コスト上昇圧力）の相反する効果を示しています。"}},{"id":5,"title":"DCF法","subtitle":"割引キャッシュフロー法の実践","phase":1,"content":"<h3>第1章 DCF法の基本</h3>\n<p>DCF法（Discounted Cash Flow法：割引キャッシュフロー法）は、企業が将来生み出すキャッシュフローを現在価値に割り引いて企業価値を算定する手法です。</p>\n\n<p><strong>企業価値 = Σ FCFt ÷ (1+WACC)^t + ターミナルバリューの現在価値</strong></p>\n\n<h4>DCF法の位置づけ</h4>\n<table>\n<tr><th>評価手法</th><th>特徴</th></tr>\n<tr><td>DCF法</td><td>絶対評価。将来CFの現在価値。理論的に最も正確だが、予測依存度高い</td></tr>\n<tr><td>マルチプル法</td><td>相対評価。類似企業との比較。簡便だが、類似企業選定に依存</td></tr>\n<tr><td>純資産法</td><td>ストック評価。清算価値の算定に使用。収益性を反映しない</td></tr>\n</table>\n\n<h4>DCF法のメリット・デメリット</h4>\n<p><strong>メリット：</strong></p>\n<ul>\n<li>企業固有の将来計画を反映できる（成長率、投資計画など）</li>\n<li>シナジー効果など、M&A特有の価値も織り込める</li>\n<li>理論的に最も正確な企業価値算定手法</li>\n<li>感応度分析により価値の変動要因を把握できる</li>\n</ul>\n\n<p><strong>デメリット：</strong></p>\n<ul>\n<li>将来予測の精度に大きく依存する（予測が外れると評価も外れる）</li>\n<li>割引率、成長率など前提条件の設定に主観が入りやすい</li>\n<li>ターミナルバリューの影響が大きく、その算定が難しい</li>\n<li>計算が複雑で、非専門家には理解しにくい</li>\n</ul>\n\n<h3>第2章 フリーキャッシュフロー（FCF）の算定</h3>\n<p>DCF法で使用するFCF（Free Cash Flow to Firm）は、事業活動から生み出されるキャッシュフローのうち、株主と債権者の両方に分配可能な金額です。</p>\n\n<h4>FCF計算式</h4>\n<p><strong>FCF = NOPLAT + 減価償却費 − 設備投資 − 運転資本増加額</strong></p>\n<p>または：</p>\n<p><strong>FCF = EBIT × (1−T) + D&A − Capex − ΔWC</strong></p>\n\n<h4>各構成要素の詳細</h4>\n<p><strong>NOPLAT（税引後営業利益）</strong></p>\n<p>NOPLAT = 営業利益 × (1 − 実効税率)</p>\n<p>支払利息控除後の税金ではなく、営業利益に対する理論上の税金を使用します。</p>\n\n<p><strong>減価償却費（D&A）</strong></p>\n<p>減価償却費は非資金費用（キャッシュアウトを伴わない）であるため、FCF計算では加算します。</p>\n\n<p><strong>設備投資（Capex）</strong></p>\n<table>\n<tr><th>種類</th><th>内容</th></tr>\n<tr><td>維持投資</td><td>既存設備の更新・維持に必要な投資。減価償却費と同程度</td></tr>\n<tr><td>成長投資</td><td>事業拡大・新規事業のための追加投資</td></tr>\n</table>\n\n<p><strong>運転資本増加額（ΔWC）</strong></p>\n<p>運転資本 = 売上債権 + 棚卸資産 − 仕入債務</p>\n<p>売上が成長する局面では、通常、運転資本も増加するため、FCFにはマイナスの影響があります。</p>\n\n<h4>FCF計算の実例</h4>\n<p><strong>前提：</strong>営業利益100億円、実効税率30%、減価償却費25億円、設備投資35億円、運転資本増加10億円</p>\n\n<p><strong>Step 1：NOPLAT</strong></p>\n<ul>\n<li>NOPLAT = 100億円 × (1 − 30%) = 70億円</li>\n</ul>\n\n<p><strong>Step 2：FCF</strong></p>\n<ul>\n<li>FCF = 70億円 + 25億円 − 35億円 − 10億円 = 50億円</li>\n</ul>\n\n<h3>第3章 ターミナルバリュー（継続価値）</h3>\n<p>ターミナルバリュー（TV：Terminal Value）は、予測期間終了後の企業価値です。通常、詳細な事業計画は5〜10年程度しか作成できないため、それ以降の価値をTVとして一括計算します。</p>\n\n<p>企業価値に占めるTVの割合は非常に大きく（しばしば50〜80%）、その算定は極めて重要です。</p>\n\n<h4>永久成長率法（ゴードン成長モデル）</h4>\n<p><strong>TV = FCF(n+1) ÷ (WACC − g)</strong></p>\n<p>FCF(n+1) = FCF(n) × (1 + g)</p>\n<p>g：永久成長率（通常0〜2%程度）</p>\n\n<h4>永久成長率の設定指針</h4>\n<table>\n<tr><th>成長率</th><th>想定シナリオ</th></tr>\n<tr><td>0%</td><td>成長なし。成熟産業、衰退産業。保守的な前提</td></tr>\n<tr><td>1〜2%</td><td>インフレ率並み。多くの評価で使用される標準的な水準</td></tr>\n<tr><td>2〜3%</td><td>名目GDP成長率並み。やや楽観的な前提</td></tr>\n</table>\n\n<p><strong>注意：</strong>永久成長率がWACCに近づくとTVは無限大に発散するため、保守的な設定が重要です。</p>\n\n<h4>永久成長率法の計算例</h4>\n<p><strong>前提：</strong>予測最終年度（5年目）のFCF：80億円、WACC：7%、永久成長率：1.5%</p>\n\n<p><strong>Step 1：6年目のFCF</strong></p>\n<ul>\n<li>FCF(6) = 80億円 × (1 + 1.5%) = 81.2億円</li>\n</ul>\n\n<p><strong>Step 2：ターミナルバリュー（5年末時点）</strong></p>\n<ul>\n<li>TV = 81.2億円 ÷ (7% − 1.5%) = 81.2億円 ÷ 5.5% = 1,476億円</li>\n</ul>\n\n<h3>第4章 DCF法による企業価値算定</h3>\n<p><strong>算定プロセス</strong></p>\n<ol>\n<li>将来FCFの予測（通常5〜10年）</li>\n<li>WACCの算定</li>\n<li>予測期間FCFの現在価値計算</li>\n<li>ターミナルバリューの算定と現在価値計算</li>\n<li>企業価値（EV）の算出</li>\n<li>株式価値への換算</li>\n</ol>\n\n<h4>DCF法による企業価値算定の総合例</h4>\n<p><strong>前提条件：</strong></p>\n<ul>\n<li>予測期間：5年</li>\n<li>WACC：6%</li>\n<li>永久成長率：1%</li>\n<li>FCF予測：1年目40億円、2年目45億円、3年目50億円、4年目55億円、5年目60億円</li>\n</ul>\n\n<p><strong>Step 1：予測期間FCFの現在価値</strong></p>\n<table>\n<tr><th>年度</th><th>FCF</th><th>割引係数</th><th>現在価値</th></tr>\n<tr><td>1年目</td><td>40億円</td><td>1/(1.06)^1=0.943</td><td>37.7億円</td></tr>\n<tr><td>2年目</td><td>45億円</td><td>1/(1.06)^2=0.890</td><td>40.1億円</td></tr>\n<tr><td>3年目</td><td>50億円</td><td>1/(1.06)^3=0.840</td><td>42.0億円</td></tr>\n<tr><td>4年目</td><td>55億円</td><td>1/(1.06)^4=0.792</td><td>43.6億円</td></tr>\n<tr><td>5年目</td><td>60億円</td><td>1/(1.06)^5=0.747</td><td>44.8億円</td></tr>\n<tr><td><strong>合計</strong></td><td></td><td></td><td><strong>208.2億円</strong></td></tr>\n</table>\n\n<p><strong>Step 2：ターミナルバリュー</strong></p>\n<ul>\n<li>6年目FCF = 60億円 × 1.01 = 60.6億円</li>\n<li>TV（5年末時点）= 60.6億円 ÷ (6% − 1%) = 1,212億円</li>\n<li>TVの現在価値 = 1,212億円 × 0.747 = 905.4億円</li>\n</ul>\n\n<p><strong>Step 3：企業価値（EV）</strong></p>\n<ul>\n<li>EV = 208.2億円 + 905.4億円 = 1,113.6億円</li>\n</ul>\n\n<p><strong>Step 4：株式価値（純有利子負債が200億円の場合）</strong></p>\n<ul>\n<li>株式価値 = 1,113.6億円 − 200億円 = 913.6億円</li>\n</ul>\n\n<h3>第5章 感応度分析</h3>\n<h4>感応度分析の重要性</h4>\n<p>DCF法の結果は、前提条件に大きく依存します。感応度分析により、前提条件の変化が企業価値に与える影響を把握し、評価の幅を示すことが重要です。</p>\n\n<h4>主な分析対象</h4>\n<ul>\n<li>WACC：0.5%刻みで上下に変動させる</li>\n<li>永久成長率：0%〜2.5%程度の範囲で変動させる</li>\n<li>売上高成長率：楽観・基本・悲観シナリオを設定</li>\n<li>営業利益率：コスト構造の変動を反映</li>\n</ul>\n\n<h4>感応度分析の例（WACC × 永久成長率）</h4>\n<p>基本ケース：WACC6%、永久成長率1%、企業価値1,114億円</p>\n\n<table>\n<tr><th>WACC  g</th><th>0.5%</th><th>1.0%</th><th>1.5%</th><th>2.0%</th></tr>\n<tr><td>5.0%</td><td>1,350</td><td>1,480</td><td>1,650</td><td>1,880</td></tr>\n<tr><td>5.5%</td><td>1,180</td><td>1,280</td><td>1,400</td><td>1,560</td></tr>\n<tr><td>6.0%</td><td>1,040</td><td>1,114</td><td>1,210</td><td>1,330</td></tr>\n<tr><td>6.5%</td><td>920</td><td>980</td><td>1,050</td><td>1,140</td></tr>\n<tr><td>7.0%</td><td>820</td><td>870</td><td>930</td><td>1,000</td></tr>\n</table>\n\n<p>この例では、前提条件の範囲内で企業価値は820億円〜1,880億円と大きく変動します。M&A案件の取締役会報告において、基本ケースでの企業価値1,100億円、前提条件の合理的な範囲では900〜1,300億円というように、評価の幅を示すことが重要です。</p>","keyPoints":["DCF法は企業価値の絶対評価で、将来キャッシュフローの現在価値に基づく","FCF = NOPLAT + 減価償却費 − 設備投資 − 運転資本増加により計算","ターミナルバリューはDCF評価値の50～80%を占める重要な要素","永久成長率法（ゴードン成長モデル）：TV = FCF(n+1) ÷ (WACC − g)","永久成長率は保守的に1～2%程度が標準的","感応度分析により、WACC、成長率などの前提条件変化の影響を把握可能"],"quizzes":[{"question":"営業利益150億円、実効税率30%、減価償却費50億円、設備投資70億円、運転資本増加20億円の場合、FCFはいくらか？","options":["65億円","75億円","85億円","95億円"],"answer":0,"explanation":"【解法】Step 1：NOPLAT = 150 × (1 − 30%) = 105億円。Step 2：FCF = 105 + 50 − 70 − 20 = 65億円。減価償却費は非資金費用なので加算し、設備投資と運転資本増加はキャッシュ流出なので控除します。"},{"question":"予測最終年度のFCFが100億円、WACC8%、永久成長率1.5%の場合、ターミナルバリュー（5年末時点）はいくらか？","options":["1,200億円","1,450億円","1,562億円","1,800億円"],"answer":2,"explanation":"【解法】Step 1：6年目FCF = 100 × 1.015 = 101.5億円。Step 2：TV = 101.5 ÷ (8% − 1.5%) = 101.5 ÷ 6.5% = 1,562億円。この金額は5年末時点での継続価値です。"},{"question":"DCF法のメリットとして正しいのはどれか？","options":["計算が簡単で、すぐに企業価値が分かる","企業固有の将来計画とシナジー効果を織り込める","マルチプル法よりも操作の余地がない","予測期間が短いので精度が高い"],"answer":1,"explanation":"【解法】DCF法は成長率、投資計画、M&A後のシナジーなど企業固有の要素を具体的に織り込める点が最大のメリットです。ただし、計算は複雑で、前提条件に主観が入りやすく、将来予測の精度に依存するデメリットもあります。"},{"question":"ターミナルバリューが企業価値に占める割合が大きい理由として最も適切なのはどれか？","options":["予測期間のFCFより、予測期間終了後の価値が必ず大きい","詳細予測は5～10年程度に限定され、それ以降は永久に継続するため","WACC − g の値が小さいため、計算結果が大きくなる","タックスシールド効果がターミナルバリューに全て集約される"],"answer":2,"explanation":"【解法】ターミナルバリュー計算式 TV = FCF(n+1) ÷ (WACC − g) で、分母が小さい（WACC − g が小さい）と結果が大きくなります。例えば、WACC=6%、g=1%なら分母は5%。この分母の小ささがTV の大きさの理由であり、TV が全体価値の50～80%を占めるのはそのためです。"},{"question":"永久成長率を3%に設定した場合、WACCが5%のときはどのような問題が生じるか？","options":["ターミナルバリューが計算できない","ターミナルバリューが無限大に発散する","ターミナルバリューが負の値になる","特に問題は生じない"],"answer":1,"explanation":"【解法】TV = FCF(n+1) ÷ (WACC − g) の分母が WACC − g = 5% − 3% = 2% になります。g がWACCに近づくほど分母が小さくなり、g がWACCを上回るなら分母が負になり、計算が成立しません。永久成長率は WACC より低く、通常1～2%の保守的な水準を使用する理由はここにあります。"},{"question":"感応度分析を実施する最も重要な理由は何か？","options":["計算ミスをチェックするため","前提条件の変化が企業価値に与える影響を把握し、評価の幅を明示するため","複数の評価アプローチを同時に実施するため","規制当局への報告書作成のため"],"answer":1,"explanation":"【解法】感応度分析は、WACC、永久成長率、売上高成長率などの前提条件が変化したときに企業価値がどう変動するかを分析します。単一の価値ではなく、合理的な前提条件の範囲内での評価幅を示すことで、M&A価格交渉における譲歩可能な範囲を定量的に把握できます。"},{"question":"DCF法でFCFを計算する際、なぜNOPLATではなく営業利益に対して税金を控除するのか？","options":["営業利益の方が簡単に入手できるから","負債の税効果を除外し、事業本来のキャッシュフロー能力を測定するため","会計処理上、営業利益から直接計算する方が正確だから","特に理由はなく、慣習的に行われているだけ"],"answer":1,"explanation":"【解法】NOPLATは、営業利益に対して理論上の「みなし税金」を控除したものです。支払利息控除後の税金ではなく営業利益に対して税金を控除することで、資本構成（負債の量）の影響を排除します。これにより、企業の事業本来のキャッシュフロー生成能力を純粋に測定できます。"}],"calculations":[{"question":"FCF計算：営業利益200億円、実効税率32%、減価償却費60億円、設備投資90億円、運転資本増加15億円の場合のFCFを計算してください","hint":"FCF = NOPLAT + 減価償却費 − 設備投資 − 運転資本増加 を使用してください","answer":"155億円","steps":["Step 1：NOPLATを計算します。NOPLAT = 200 × (1 − 32%) = 200 × 0.68 = 136億円","Step 2：減価償却費を加算します。136 + 60 = 196億円","Step 3：設備投資を控除します。196 − 90 = 106億円","Step 4：運転資本増加を控除します。106 − 15 = 91億円"],"explanation":"計算値は91億円です。減価償却費は非資金費用（P/Lでは費用だが、実際の現金流出がない）なので加算します。設備投資と運転資本増加はキャッシュ流出なので控除します。この計算により、事業から実際に生じるフリーキャッシュフロー（株主と債権者で分配可能な現金）が算出されます。"},{"question":"DCF企業価値計算：以下の条件で企業価値（EV）を計算してください。5年間のFCF：1年目50億円、2年目55億円、3年目60億円、4年目65億円、5年目70億円。WACC：6.5%、永久成長率：1.5%","hint":"Step 1で予測期間FCFのPVを計算し、Step 2でターミナルバリューを計算し、Step 3で企業価値を求めます","answer":"1,029億円","steps":["Step 1：予測期間FCFの現在価値を計算します","  PV(1年目) = 50 ÷ (1.065)^1 = 46.95億円","  PV(2年目) = 55 ÷ (1.065)^2 = 48.50億円","  PV(3年目) = 60 ÷ (1.065)^3 = 50.13億円","  PV(4年目) = 65 ÷ (1.065)^4 = 54.04億円","  PV(5年目) = 70 ÷ (1.065)^5 = 54.77億円","  合計 = 254.39億円","Step 2：ターミナルバリューを計算します","  6年目FCF = 70 × (1 + 1.5%) = 71.05億円","  TV（5年末時点）= 71.05 ÷ (6.5% − 1.5%) = 71.05 ÷ 5% = 1,421億円","Step 3：TVの現在価値を計算します","  PV(TV) = 1,421 ÷ (1.065)^5 = 1,110.7億円","Step 4：企業価値を計算します","  EV = 254.39 + 1,110.7 = 1,365.09億円"],"explanation":"計算結果は約1,365億円です。重要な点として、ターミナルバリューのPVが約810億円で、全体の約59%を占めています。DCF評価では通常、ターミナルバリューが50～80%を占めるため、TV の仮定（WACC、永久成長率）の設定が企業価値に極めて大きな影響を与えることに注意が必要です。感応度分析でWACCや永久成長率の変動シナリオを分析することが重要な理由はここにあります。"},{"question":"感応度分析：基本ケースの企業価値が1,200億円（WACC6%、永久成長率1.5%）の場合、WACCが5.5%に低下したときの企業価値を概算してください。（ゴードン成長モデルにおいて、WACC − g の変化は企業価値に逆比例することを利用）","hint":"TV = FCF(n+1) ÷ (WACC − g) の関係式を利用して、WACCの変化がTVにどう影響するかを分析してください","answer":"約1,385～1,400億円","steps":["Step 1：基本ケースでの分母を確認します","  基本ケース：WACC − g = 6% − 1.5% = 4.5%","Step 2：新シナリオでの分母を計算します","  新シナリオ：WACC − g = 5.5% − 1.5% = 4.0%","Step 3：分母の変化率を計算します","  変化率 = 4.5% ÷ 4.0% = 1.125（12.5%増加）","Step 4：ターミナルバリューが12.5%増加すると仮定します","  TV の増加額 ≈ 基本ケースの企業価値の約50～70% × 12.5%","  ≈ 1,200 × 65% × 12.5% ≈ 97.5億円","Step 5：新しい企業価値を概算します","  新企業価値 ≈ 1,200 + 98 ≈ 1,298～1,385億円"],"explanation":"WACCが6%から5.5%に低下すると、企業価値は約1,300～1,400億円に上昇します。これは、割引率の低下により将来キャッシュフローの現在価値が増加するためです。DCF法は感応度分析を通じて、割引率（WACC）の変化が企業価値に与える影響を定量的に把握できるため、M&A交渉において合理的な価格レンジを設定する際に極めて有用です。"}],"caseStudy":{"title":"Z社のDCF法による企業価値評価","scenario":"Z社は年間売上高500億円、営業利益40億円の製造業企業です。M&A候補企業として評価を依頼されました。将来5年間のFCF予測は以下の通りです：1年目：30億円、2年目：33億円、3年目：36億円、4年目：39億円、5年目：42億円。Z社のWACC：6.0%、永久成長率：1.0%。現在の純有利子負債は80億円です。","questions":["5年間の予測期間におけるFCFの現在価値合計を計算してください。割引係数も示してください。","ゴードン成長モデルを使用して、ターミナルバリューを計算してください。5年末時点でのTVと、その現在価値も求めてください。","Z社の企業価値（EV）と株式価値を計算してください。","WACCが5.5%に低下したシナリオにおける企業価値の変化を分析してください。"],"modelAnswer":"【Z社のDCF法による企業価値評価】\n\n1. 予測期間（1-5年）FCFの現在価値計算\n\nWACC = 6.0%の割引係数：\n・1年目：1/(1.06)^1 = 0.9434\n・2年目：1/(1.06)^2 = 0.8900\n・3年目：1/(1.06)^3 = 0.8396\n・4年目：1/(1.06)^4 = 0.7921\n・5年目：1/(1.06)^5 = 0.7473\n\n現在価値計算：\n・1年目：30 × 0.9434 = 28.30億円\n・2年目：33 × 0.8900 = 29.37億円\n・3年目：36 × 0.8396 = 30.23億円\n・4年目：39 × 0.7921 = 30.89億円\n・5年目：42 × 0.7473 = 31.39億円\n\n予測期間FCFのPV合計 = 150.18億円\n\n2. ターミナルバリュー計算\n\nStep 1：6年目のFCF\n  FCF(6) = 42 × (1 + 1%) = 42.42億円\n\nStep 2：ターミナルバリュー（5年末時点）\n  TV = FCF(6) ÷ (WACC − g)\n  TV = 42.42 ÷ (6% − 1%)\n  TV = 42.42 ÷ 5%\n  TV = 848.4億円\n\nStep 3：TVの現在価値\n  PV(TV) = 848.4 × 0.7473 = 633.6億円\n\nターミナルバリューが全体に占める割合 = 633.6 ÷ (150.18 + 633.6) = 80.8%\n（典型的な50～80%の範囲内）\n\n3. 企業価値と株式価値\n\n企業価値（EV）計算\n  EV = 予測期間FCFのPV + TVのPV\n  EV = 150.18 + 633.6\n  EV = 783.78億円 ≈ 784億円\n\n株式価値計算\n  株式価値 = EV − 純有利子負債\n  株式価値 = 784 − 80\n  株式価値 = 704億円\n\n4. WACC低下シナリオ（WACC 5.5%）の分析\n\nシナリオ分析：WACC = 5.5%\n\nStep 1：新しい割引係数\n・1年目：1/(1.055)^1 = 0.9479\n・2年目：1/(1.055)^2 = 0.8985\n・3年目：1/(1.055)^3 = 0.8516\n・4年目：1/(1.055)^4 = 0.8072\n・5年目：1/(1.055)^5 = 0.7651\n\nStep 2：新しい予測期間FCFのPV\n・1年目：30 × 0.9479 = 28.44億円\n・2年目：33 × 0.8985 = 29.65億円\n・3年目：36 × 0.8516 = 30.66億円\n・4年目：39 × 0.8072 = 31.48億円\n・5年目：42 × 0.7651 = 32.13億円\n合計 = 152.36億円\n\nStep 3：新しいターミナルバリュー\n  TV = 42.42 ÷ (5.5% − 1%) = 42.42 ÷ 4.5% = 942.7億円\n  PV(TV) = 942.7 × 0.7651 = 721.6億円\n\nStep 4：新しいEV\n  EV（新） = 152.36 + 721.6 = 873.96億円 ≈ 874億円\n\n差異分析\n  基本ケース（WACC 6%）：784億円\n  新シナリオ（WACC 5.5%）：874億円\n  増加額：90億円（+11.5%）\n\n解釈：\nWACCがわずか0.5%低下しただけで、企業価値は約90億円（11.5%）増加します。\nこれは、割引率の低下により将来キャッシュフローの現在価値が大きく増加するためです。\nWACCの決定（CAPM、資本構成、信用力）が企業価値評価に極めて大きな影響を与えることが\n明らかになります。\n\nM&A交渉への示唆：\n・基本ケース評価額：704億円（株式価値）\n・保守的評価（WACC 6.5%）：約650億円\n・楽観的評価（WACC 5.5%）：約800億円\n・推奨買収価格レンジ：650～800億円"}},{"id":6,"title":"Phase 1総復習","subtitle":"ファイナンス基礎の実践","phase":1,"content":"<h3>Phase 1 学習内容サマリー</h3>\n<table>\n<tr><th>Week</th><th>テーマ</th><th>主な学習内容</th></tr>\n<tr><td>1</td><td>財務諸表の基礎①</td><td>P/L・B/S・C/Fの構造、三表の相互関係</td></tr>\n<tr><td>2</td><td>財務諸表の基礎②</td><td>財務指標分析（収益性・安全性・効率性）、デュポン分析</td></tr>\n<tr><td>3</td><td>企業価値評価の概念</td><td>EV・株式価値、マルチプル法（PER・EV/EBITDA）</td></tr>\n<tr><td>4</td><td>資本コスト</td><td>CAPM、β、WACC</td></tr>\n<tr><td>5</td><td>DCF法</td><td>FCF計算、ターミナルバリュー、感応度分析</td></tr>\n</table>\n\n<h3>重要公式の整理</h3>\n<h4>財務指標</h4>\n<p><strong>ROE = 当期純利益 ÷ 自己資本 = 利益率 × 回転率 × レバレッジ</strong></p>\n<p><strong>ROA = 当期純利益 ÷ 総資産</strong></p>\n<p><strong>自己資本比率 = 自己資本 ÷ 総資産</strong></p>\n<p><strong>D/Eレシオ = 有利子負債 ÷ 自己資本</strong></p>\n\n<h4>企業価値評価</h4>\n<p><strong>EV = 時価総額 + 純有利子負債</strong></p>\n<p><strong>株式価値 = EV − 純有利子負債</strong></p>\n<p><strong>EV/EBITDA = 企業価値 ÷ EBITDA</strong></p>\n\n<h4>資本コスト</h4>\n<p><strong>株主資本コスト = Rf + β × (Rm − Rf)</strong></p>\n<p><strong>WACC = Re × E/(D+E) + Rd × (1−T) × D/(D+E)</strong></p>\n\n<h4>DCF法</h4>\n<p><strong>FCF = NOPLAT + D&A − Capex − ΔWC</strong></p>\n<p><strong>TV = FCF_n+1 ÷ (WACC − g)</strong></p>\n\n<h3>ケーススタディ：X社の企業価値評価</h3>\n<p>あなたは経営企画部の担当者として、M&A候補であるX社の企業価値評価を任されました。</p>\n\n<h4>X社の財務データ</h4>\n<table>\n<tr><th>項目</th><th>金額（億円）</th></tr>\n<tr><td>売上高</td><td>1,000</td></tr>\n<tr><td>営業利益</td><td>80</td></tr>\n<tr><td>当期純利益</td><td>50</td></tr>\n<tr><td>減価償却費</td><td>30</td></tr>\n<tr><td>総資産</td><td>800</td></tr>\n<tr><td>自己資本（純資産）</td><td>400</td></tr>\n<tr><td>有利子負債</td><td>250</td></tr>\n<tr><td>現金及び預金</td><td>100</td></tr>\n<tr><td>EBITDA</td><td>110</td></tr>\n</table>\n\n<h4>追加情報</h4>\n<ul>\n<li>類似上場企業の平均マルチプル：EV/EBITDA 8.0倍、PER 15倍</li>\n<li>X社のβ：1.1、リスクフリーレート：1.0%、マーケットリスクプレミアム：5.5%</li>\n<li>X社の負債コスト（税引前）：2.5%、実効税率：30%</li>\n<li>資本構成（時価ベース）：株主資本70%、有利子負債30%</li>\n</ul>\n\n<h3>重要な学習ポイント</h3>\n\n<h4>1. 財務指標分析を通じた企業評価の基礎</h4>\n<p>収益性（ROE、ROA）、安全性（自己資本比率、D/Eレシオ）、効率性（資産回転率）を総合的に評価し、企業の強みと課題を把握します。</p>\n\n<h4>2. 複数の評価手法の組み合わせ</h4>\n<p>マルチプル法（相対評価）とDCF法（絶対評価）の両方を実施し、評価結果の幅を把握することが実務的です。</p>\n\n<h4>3. CAPM と WACC の理解の重要性</h4>\n<p>企業固有のリスク（β）を WACC に適切に反映させることが、正確な企業価値評価の鍵となります。</p>\n\n<h4>4. ターミナルバリューの影響</h4>\n<p>DCF評価においてターミナルバリューが50～80%を占めるため、その前提条件（永久成長率、WACC）の設定が極めて重要です。</p>\n\n<h4>5. 感応度分析による不確実性の管理</h4>\n<p>単一の評価値ではなく、複数シナリオ（楽観・基本・悲観）での評価幅を示すことで、M&A交渉における譲歩可能な範囲を定量的に把握できます。</p>\n\n<h4>6. 資本構成（WACC）の最適化</h4>\n<p>タックスシールド効果とリスク増加のバランスを考慮し、企業価値を最大化する資本構成を検討することが経営課題となります。</p>","keyPoints":["財務指標（ROE、ROA、自己資本比率）で企業の健全性と収益性を評価","EV = 時価総額 + 純有利子負債により、企業全体の価値を算出","CAPM公式で個別企業のリスク（β）を反映した株主資本コストを計算","WACCは企業全体の資本コストで、投資プロジェクトのハードルレート","FCF = NOPLAT + D&A − Capex − ΔWC で企業のキャッシュ生成能力を測定","マルチプル法とDCF法の組み合わせで評価の信頼性が向上"],"quizzes":[{"question":"X社の ROE（当期純利益÷自己資本）はいくらか？","options":["5%","12.5%","15%","20%"],"answer":1,"explanation":"【解法】ROE = 50億円 ÷ 400億円 = 12.5%。ROE は株主資本に対する利益の効率性を示し、12.5% は伊藤レポートの 8% 基準を上回り良好な水準です。"},{"question":"X社の純有利子負債はいくらか？","options":["100億円","150億円","250億円","350億円"],"answer":1,"explanation":"【解法】純有利子負債 = 有利子負債 − 現金 = 250 − 100 = 150億円。これは企業価値（EV）から株式価値を計算する際に使用されます。"},{"question":"X社の CAPM による株主資本コストはいくらか？","options":["6.05%","7.05%","8.05%","9.05%"],"answer":1,"explanation":"【解法】株主資本コスト = Rf + β × MRP = 1.0% + 1.1 × 5.5% = 1.0% + 6.05% = 7.05%。X社のβ=1.1は市場平均より 10% 高いリスクを反映しています。"},{"question":"X社の税引後負債コストはいくらか？","options":["1.25%","1.75%","2.5%","3.5%"],"answer":1,"explanation":"【解法】税引後負債コスト = 2.5% × (1 − 30%) = 2.5% × 0.7 = 1.75%。利息支払いが税務上の損金となるため、実質的な負債コストは低くなります。"},{"question":"X社の WACC はいくらか？","options":["4.5%","5.0%","5.46%","6.0%"],"answer":2,"explanation":"【解法】WACC = 7.05% × 70% + 1.75% × 30% = 4.935% + 0.525% = 5.46%。この値がX社の新規投資プロジェクトの採否判断のハードルレートになります。"},{"question":"X社のマルチプル法による企業価値（EV/EBITDA マルチプル）はいくらか？","options":["880億円","920億円","1,000億円","1,100億円"],"answer":0,"explanation":"【解法】EV = EBITDA × EV/EBITDA倍率 = 110 × 8.0 = 880億円。マルチプル法は相対評価で、類似企業の評価倍率を使用します。"},{"question":"X社の株式価値（マルチプル法）はいくらか？","options":["680億円","730億円","780億円","830億円"],"answer":1,"explanation":"【解法】株式価値 = EV − 純有利子負債 = 880 − 150 = 730億円。純有利子負債（有利子負債−現金）を控除することで、株主に帰属する価値を計算します。"},{"question":"Phase 1 で学習した 5 つのテーマを全て列挙してください。最も重要な関連性を説明してください。","options":["財務諸表、財務指標、企業価値評価、資本コスト、DCF法","P/L、B/S、C/F、CAPM、WACC","ROE、ROA、PER、EV/EBITDA、FCF","マルチプル法、絶対評価、相対評価、感応度分析、シナジー"],"answer":0,"explanation":"【解法】Phase 1 は「財務諸表、財務指標、企業価値評価、資本コスト、DCF法」の 5 つのテーマから構成されています。関連性は以下の通り：財務諸表（Week 1-2）→ 企業価値評価の基礎（Week 3）→ 割引率決定に必要な資本コスト（Week 4）→ DCF 法による企業価値評価（Week 5）。つまり、財務データから始まり、段階的に企業価値算定に至る論理的なフローが構築されています。"}],"calculations":[{"question":"X社の自己資本比率、D/Eレシオを計算し、財務安全性を評価してください","hint":"自己資本比率 = 自己資本÷総資産、D/Eレシオ = 有利子負債÷自己資本を使用してください","answer":"自己資本比率50%、D/Eレシオ0.625倍","steps":["Step 1：自己資本比率を計算します。自己資本比率 = 400 ÷ 800 = 50%","Step 2：D/Eレシオを計算します。D/E = 250 ÷ 400 = 0.625倍","Step 3：財務安全性の評価を行います。","  ・自己資本比率50%は、総資産の半分が自己資本で構成されており、良好な水準","  ・D/Eレシオ0.625倍は、自己資本に対して有利子負債が 62.5% で、健全な負債水準","  ・多くの企業の目標値が D/E 0.5～1.0倍 であり、X社は安全圏内に位置"],"explanation":"X社の財務安全性は高い水準にあります。自己資本比率50%と D/Eレシオ0.625倍は、業界平均（製造業で自己資本比率35～40%、D/E0.8～1.2倍）と比較してもバランスが取れています。これにより、経営の安定性があり、M&A対象企業として信用力が高いと評価できます。"},{"question":"X社の来期予想が営業利益90億円、減価償却費32億円、設備投資40億円、運転資本増加8億円の場合、FCFを計算してください","hint":"FCF = NOPLAT + 減価償却費 − 設備投資 − 運転資本増加を使用してください","answer":"47億円","steps":["Step 1：NOPLATを計算します。NOPLAT = 90 × (1 − 30%) = 63億円","Step 2：減価償却費を
